<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>애리체스</title>
  <style>
    body { 
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif; 
      background-color: #ffffff; /* 순수 흰색 배경 */
      color: #1e293b;
      margin: 0;
      padding: 20px;
    }

    .container {
      display: flex;
      gap: 40px; /* 3단 대시보드 조율을 위해 간격 40px 유지 */
      justify-content: center;
      margin-top: 60px;
    }

    .left-panel { 
      width: 600px; 
      display: flex; 
      flex-direction: column; 
      gap: 15px; 
    }

    /* 🏆 [신규] PC용 왼쪽 랭킹 리더보드 패널 디자인 */
    .leaderboard-panel {
      width: 320px;
      height: 547px; /* 배틀필드, 사이드 패널과 높이 통일 */
      background: #f8fafc; /* 로그창과 통일감 있는 배경색 */
      border: 2px dashed #3b66f5; 
      border-radius: 12px;
      padding: 14px;
      box-sizing: border-box;
      box-shadow: 0 4px 16px rgba(59, 102, 245, 0.06);
      display: flex;
      flex-direction: column;
      margin-top: 72px; /* 이 숫자가 커질수록 랭킹판이 점점 더 아래로 내려갑니다. */

    }
    .leaderboard-panel h3 {
      margin: 0 0 10px 0;
      text-align: center;
      color: #1e293b;
      font-size: 16px;
      border-bottom: 2px solid #e2e8f0;
      padding-bottom: 8px;
    }
    .leaderboard-table {
      width: 100%;
      border-collapse: collapse;
    }
    .leaderboard-table th {
      background-color: #3b66f5;
      color: #ffffff;
      padding: 6px;
      font-size: 12px;
      border-radius: 4px;
    }
    .leaderboard-table td {
      padding: 8px 4px;
      border-bottom: 1px solid #e2e8f0;
      text-align: center;
      font-size: 13px;
    }
    .rank-num { font-weight: bold; }
    .leaderboard-table tr:nth-child(1) .rank-num { color: #fbbf24; } /* 1등 금색 */
    .leaderboard-table tr:nth-child(2) .rank-num { color: #94a3b8; } /* 2등 은색 */
    .leaderboard-table tr:nth-child(3) .rank-num { color: #b45309; } /* 3등 동색 */
    .p-tag { font-size: 10px; color: #94a3b8; margin-left: 3px; }

    /* 배틀 그리드 */
    .battleGrid {
      display: grid;
      grid-template-columns: repeat(6, 80px);
      grid-template-rows: repeat(6, 80px); 
      gap: 6px;
      background: #eaf0fa; 
      padding: 12px;
      border-radius: 12px;
      border: 2px solid #3b66f5; 
      box-shadow: 0 10px 30px rgba(59, 102, 245, 0.12);
      height: 520px; 
      flex-shrink: 0;
    }

    .cell {
      background: #ffffff;
      border: 1px solid #b4c6ef;
      border-radius: 8px;
      position: relative;
      overflow: visible;
      transition: all 0.2s ease;
      perspective: 600px;
    }

    .cell.dragover {
      border: 2px dashed #3b66f5;
      background: #f0f4fe;
    }

    .cell.UR-active {
      z-index: 10;
      transition: all 0.5s ease;
    }
    
    @property --aura-alpha {
      syntax: '<number>';
      inherits: false;
      initial-value: 0.6;
    }

    .cell.UR-active::before {
      content: "";
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);  
      width: 105%;
      height: 105%;
      background: radial-gradient(circle, 
        transparent 30%, 
        rgba(255, 0, 80, calc(var(--aura-alpha) + 0.3)) 50%, 
        rgba(180, 150, 255, var(--aura-alpha)) 80%, 
        transparent 100%
      );
      filter: blur(15px);
      animation: color-breath 4s infinite ease-in-out;
      pointer-events: none;
      z-index: 0;
    }

    .char-grid.placed.UR {
      border: 2px solid #ff0080 !important;
      box-shadow: 0 0 25px rgba(128, 0, 255, 0.6) !important;
      animation: card-float-purple 3s infinite ease-in-out;
    }

    @keyframes color-breath {
      0% { --aura-alpha: 0.2; }
      50% { --aura-alpha: 0.6; }
      100% { --aura-alpha: 0.2; }
    }
    @keyframes card-float-purple {
      0%, 100% { transform: rotateX(70deg) scale(1.4) translateY(0px); }
      50% { transform: rotateX(72deg) scale(1.42) translateY(-8px); }
    }
    
    .char-wrapper { 
      position: relative; 
      display: flex; 
      justify-content: center; 
    }

    .char-card {
      width: 160px;
      border-radius: 10px;
      background: #ffffff;
      color: #1e293b;
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: grab;
      border: 2px solid #3b66f5; 
      box-shadow: 0 6px 16px rgba(59, 102, 245, 0.15);
      margin: 8px;
      overflow: hidden; 
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .char-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 24px rgba(59, 102, 245, 0.25);
    }

    .char-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      padding: 6px 10px;
      box-sizing: border-box;
      background: #3b66f5; 
      color: #ffffff;
      font-weight: bold;
    }

    .grade-badge {
      background: #ffffff;
      color: #3b66f5;
      padding: 1px 6px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 800;
    }

    .cost-display {
      color: #ffca28; 
      font-size: 12px;
      font-weight: 700;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
    }

    .char-img {
      display: block;
      object-fit: contain;
      max-width: 110px;
      max-height: 110px;
      margin-top: 8px;
    }

    .char-name {
      margin-top: 6px;
      font-size: 14px;
      text-align: center;
      font-weight: 700;
      color: #1e3a8a;
    }

    .char-power {
      font-size: 12px;
      color: #64748b;
      margin-bottom: 10px;
    }

    .char-grid {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1; 
      transform-style: preserve-3d;
      transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .char-grid.placed {
      transform: rotateX(-60deg) rotateY(0deg) scale(1);
      box-shadow: 10px 20px 30px rgba(0, 0, 0, 0.4);
    }

    .char-grid img {
      width: 80%;
      min-height: 50%;
      object-fit: contain;
      transform: translateZ(-40px);
    }

    .char-grid .grade-badge {
      position: absolute;
      top: -150px;
      left: 4px;
      background: #3b66f5;
      color: #ffffff;
      font-size: 15px;
      padding: 1px 4px;
      border-radius: 4px;
      transform: translateZ(35px);
      box-shadow: 2px 2px 5px rgba(0,0,0,0.2);
    }
    .grade-badge.N  { background: #9e9e9e; }
    .grade-badge.R  { background: #4caf50; }
    .grade-badge.SR { background: #2196f3; box-shadow: 0 0 8px #2196f3; }
    .grade-badge.SSR { background: linear-gradient(135deg, #f44336, #e91e63); box-shadow: 0 0 12px #e91e63; }
    .grade-badge.UR {
      background: linear-gradient(45deg, #ff0080, #8000ff);
      color: white;
      text-shadow: 0 0 5px rgba(255,255,255,0.5);
      box-shadow: 0 0 15px #ff0080;
    }

    @keyframes gold-glow {
      from { box-shadow: 0 0 10px #ffd700; border-color: #ffd700; }
      to { box-shadow: 0 0 25px #ffd700; border-color: #fff; }
    }

    .hpbar {
      position: absolute;
      top: -115px; 
      left: 0;
      width: 100%;
      height: 6px;
      background: #e2e8f0;
      border-radius: 3px;
      overflow: hidden;
      border: 1px solid #cbd5e1;
    }

    .hpfill {
      height: 100%;
      background-color: #10b981;
      transition: width 0.3s ease;
    }

    .side-panels { 
      display: flex;
      flex-direction: column; 
      gap: 20px;
      height: 520px;          
    }

    .log-panel, .select-panel {
      flex: 0 0 auto;
      min-width: 600px;
      height: 269px;
      background: #f8fafc; 
      border: 2px dashed #3b66f5; 
      border-radius: 12px;
      padding: 10px;
      overflow-y: auto;
      box-sizing: border-box;
      box-shadow: 0 4px 16px rgba(59, 102, 245, 0.06);
      margin-top: -10px; /* 사이드 패널과 배틀필드 간격 조절 */
    }

    .top-controls { 
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 15px;
      width: 100%;             
      position: fixed;         
      top: 0;
      left: 0;
      z-index: 1000;           
      background: white;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      white-space: nowrap;
      padding: 15px;
      border-bottom: 2px solid #e2e8f0;
      box-sizing: border-box;
    }

    .game-title {
      margin: 0;
      font-size: 24px;
      color: #1e293b;
      flex: 1; 
      text-align: left;
    }
    .controls-right {
      display: flex;
      align-items: center;
      gap: 12px;
      flex: 1; 
      justify-content: center; 
    }
    .spacer {
      flex: 1; 
    }

    .projectile {
      position: absolute;
      transition: all 1s linear; 
      width: var(--size);
      height: var(--size);
      background-image: var(--url);
      background-repeat: no-repeat;
      background-size: var(--total-size);
      animation: play-any-sprite 1s steps(var(--frames), jump-none) infinite;
      pointer-events: none;
      z-index: 999;
    }

    @keyframes play-any-sprite {
      from { background-position: 0px 0px; }
      to { 
        background-position: calc(-1 * var(--size) * (var(--cols) - 1)) 
                              calc(-1 * var(--size) * (var(--rows) - 1));
      }
    }

    #playerChars, #enemyChars {
      display: flex;
      flex-direction: row;   
      gap: 10px;             
      overflow-x: auto;      
      white-space: nowrap;   
      width: 100%;            
      max-width: 500px; 
      padding-bottom: 10px; 
      padding: 10px;        
      flex-shrink: 0;       
    }

    #playerChars .char-card, 
    #enemyChars .char-card {
      flex-shrink: 0;        
    }
    
    #battleLog {
      width: 100%;
      height: 100%;
      box-sizing: border-box;
      background: #ffffff; 
      color: #334155;
      padding: 12px;
      border-radius: 8px;
      font-family: 'Pretendard', monospace;
      font-size: 13px;
      line-height: 1.5;
      border: 1px solid #cbd5e1;
    }

    #battleLog br {
      margin-bottom: 4px;
    }

    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #3b66f5;
    }

    button {
      background-color: #ffffff;
      color: #1e293b;            
      border: 1.5px solid #3b82f6; 
      padding: 5px 15px;         
      border-radius: 4px;        
      font-weight: 500;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    button:hover {
      background-color: #eff6ff;
      border-color: #2563eb;
    }

    input {
      padding: 5px 10px;
      border: 1px solid #cbd5e1;
      border-radius: 4px;
      font-size: 14px;
      color: #475563;
    }

    #toggleMusic {
        padding: 8px 16px;
        border-radius: 20px;
        border: 2px solid #3b66f5;
        background: #ffffff;
        color: #3b66f5;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.3s ease;
        margin-right: 10px;
    }

    #toggleMusic:hover {
        background: #3b66f5;
        color: #ffffff;
    }

    #toggleMusic.off {
        border-color: #cbd5e1;
        background: #f1f5f9;
        color: #94a3b8;
    }

    #volumeSlider {
        vertical-align: middle;
        cursor: pointer;
        width: 100px; 
    }

    /* 📱 모바일 미디어 쿼리 (반응형 최적화) */
    @media (max-width: 768px) {
        .top-controls {
            flex-direction: column !important; 
            align-items: center !important;
            gap: 4px !important;
            padding: 6px 4px !important;
            height: auto !important;
        }
        .game-title {
            font-size: 1rem !important;
            text-align: center !important;
            margin: 0 0 2px 0 !important;
            flex: none !important;
        }
        .controls-right {
            display: flex !important;
            flex-direction: row !important;
            flex-wrap: wrap !important;
            justify-content: center !important;
            align-items: center !important;
            gap: 4px !important;
            width: 100% !important;
            flex: none !important;
        }
        input {
            width: 80px !important;
            padding: 2px 4px !important;
            font-size: 0.75rem !important;
            height: 22px !important;
        }
        button {
            padding: 2px 6px !important;
            font-size: 0.75rem !important;
            height: 22px !important;
            line-height: 1 !important;
        }
        #toggleMusic {
            padding: 2px 6px !important;
            font-size: 0.75rem !important;
            height: 22px !important;
            margin: 0 !important;
            border-radius: 4px !important;
        }
        #volumeSlider {
            width: 50px !important;
            height: 12px !important;
            margin: 0 !important;
            vertical-align: middle;
        }

        .container {
            display: flex !important;
            flex-direction: column !important; /* 모바일은 세로 배치 */
            align-items: center !important; 
            justify-content: center !important;
            gap: 8px !important;          
            width: 100% !important;
            padding: 10px;
            margin-top: 75px !important;   
            box-sizing: border-box !important;
        }

        /* 🚨 핵심: 모바일 레이아웃 우선순위(Order) 배치 강제조절 */
        .field-panel {
            order: 1 !important; /* 1등: 전투 필드가 제일 먼저 등장 */
            width: 100% !important;
            display: flex !important;
            flex-direction: column !important;
            align-items: center !important;
        }
        
        .side-panels {
            order: 2 !important; /* 2등: 로그 및 애리 선택창 */
            width: 100% !important;
            gap: 4px !important; 
        }

        .leaderboard-panel {
            order: 3 !important; /* 3등: 왼쪽 리더보드가 맨 밑으로 자동 하강 */
            min-width: 0 !important;
            width: 92% !important;
            height: 250px !important; /* 모바일용 컴팩트 스케일 */
            margin: 15px auto 20px auto !important;
            margin-top: 100px; /* 이 숫자가 커질수록 랭킹판이 점점 더 아래로 내려갑니다. */
        }

        .battleGrid {
            grid-template-columns: repeat(6, minmax(40px, 1fr)) !important;
            grid-template-rows: repeat(6, minmax(40px, 1fr)) !important; 
            height: auto !important;
            margin: 0 auto !important; 
            width: 90% !important;
            min-width: 340px !important;      
            max-width: 340px !important;   
        }

        .log-panel, .select-panel {
            min-width: 0 !important;      
            width: 92% !important;        
            margin: 0 auto !important;    
            display: block !important;    
            box-sizing: border-box !important;
        }
        .log-panel { max-height: 60px !important; }
        #battleLog { height: 40px !important; font-size: 0.9rem; }
    }

    /* 전역 오버레이 기본 스타일 */
    .overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0, 0, 0, 0.85); display: none; 
        justify-content: center; align-items: center; z-index: 2000;
    }
    .reward-content { 
        background: white; padding: 40px; border-radius: 20px; text-align: center; 
        box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }
    .card-container { display: flex; gap: 20px; margin-top: 20px; justify-content: center; }

    /* 배지 카드 스타일 */
    .reward-card {
        width: 160px; height: 220px; border: 3px solid #ccc; border-radius: 12px;
        display: flex; flex-direction: column; justify-content: center; align-items: center;
        cursor: pointer; transition: all 0.3s ease; background: #fff; position: relative;
        padding: 15px; box-sizing: border-box;
    }
    .reward-card:hover { transform: translateY(-5px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
    .badge-back { background: #1e293b; color: #f8fafc; border-color: #475569; }
    .badge-back h3 { font-size: 3.5rem; margin: 0; }
    .badge-back .info { display: none; } 
    .revealed { background: #fff; color: #0f172a; transform: rotateY(360deg); }
    .revealed h3 { font-size: 1rem; margin: 10px 0 5px 0; font-weight: bold; }
    .revealed p { font-size: 0.9rem; color: #64748b; margin: 0; }
    .revealed .info { display: block; }

    .mini-badge {
        width: 55px; height: 55px; border-radius: 50%; border: 3px solid white;
        background: #1e293b; color: white; display: flex; justify-content: center; align-items: center;
        font-size: 0.8rem; font-weight: bold; text-align: center; line-height: 1.2;
        box-shadow: 0 4px 6px rgba(0,0,0,0.2); cursor: help;
    }
  </style>
</head>
<body>
  
  <audio id="bgm" src="./assets/bgm.mp3" loop preload="auto"></audio>

  <div class="top-controls">
    <h2 class="game-title">🍒⛓️애리체스⛓️</h2>
    
    <div class="controls-right">
        <label>플레이어 이름: </label>
        <input id="playerTitle" type="text" placeholder="닉네임 입력">
        
        <input id="playerTag" type="text" placeholder="#태그" maxlength="5" style="width: 65px; text-align: center;">

        <button id="loadCharsBtn" onclick="initBadgeSelection()">캐릭터 불러오기</button>
        <button onclick="startBattle()">전투 시작!</button>
        <button id="toggleMusic">음악 ON 🎵</button>
        <label for="volumeSlider">볼륨:</label>
        <input type="range" id="volumeSlider" min="0" max="1" step="0.1" value="0.3">
        <span id="scoreDisplay" style="margin-left: 20px; font-weight: 900; color: #ff0080; font-size: 20px;">점수: 0</span>
    </div>
    <div class="spacer"></div>
  </div>
  
  <div class="container">
    
    <div class="leaderboard-panel">
        <h3>🏆 실시간 랭킹</h3>
        <div style="overflow-y: auto; flex: 1;">
            <table class="leaderboard-table">
                <thead>
                    <tr>
                        <th style="width: 20%;">순위</th>
                        <th style="width: 55%;">플레이어</th>
                        <th style="width: 25%;">점수</th>
                    </tr>
                </thead>
                <tbody id="leaderboardBody">
                    <tr>
                        <td colspan="3" style="text-align: center; color: #94a3b8; font-size: 13px;">랭킹 로딩 중...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="field-panel" style="display: flex; flex-direction: column; gap: 10px;">
      <h3>전투 필드</h3>
      <div id="battleGrid" class="battleGrid"></div>
    </div>

    <div class="side-panels">
      <h3 id="playerCost">코스트: 0 / 8</h3>
      <div class="log-panel">
        <h4>전투 로그</h4>
        <div id="battleLog" style="height: 200px; overflow-y: scroll; border: 1px solid #ccc;"></div>
      </div>
      
       <div class="select-panel">
            <h4>애리 선택</h4>
            <div>
              <h5 id="playerGridTitle">플레이어 캐릭터</h5>
              <div id="playerChars"></div>
            </div>
       </div>
    </div>

  </div>

  <div id="badgeUI" style="position:fixed; top:10px; right:10px; display:flex; gap:10px; z-index:1000;"></div>

  <div id="badgeInitOverlay" class="overlay">
      <div class="reward-content">
          <h2>초기 배지를 선택하세요 (카드 1장 클릭)</h2>
          <div id="badgeInitContainer" class="card-container"></div>
      </div>
  </div>

  <div id="roundRewardOverlay" class="overlay">
      <div class="reward-content">
          <h2>🎉 스테이지 클리어! 보상을 하나 선택하세요</h2>
          <div id="roundRewardContainer" class="card-container"></div>
      </div>
  </div>

  <div id="badgeExchangeOverlay" class="overlay">
      <div class="reward-content">
          <h2 style="color: #ef4444;">배지 슬롯이 가득 찼습니다! 교체할 배지를 선택하세요.</h2>
          <div id="badgeExchangeContainer" class="card-container"></div>
      </div>
  </div>

  <script>
// [1] 설정 (변수명 vconfig 준수)
const vconfig = {

// [2] 페이지 로드 시
window.onload = async () => {
    // 1. 태그 로직: 브라우저에 저장된 태그가 없으면 새로 생성
    let tag = localStorage.getItem("player_tag");

        localStorage.setItem("player_tag", tag);
    }
    // 화면에 태그 표시 (입력창이 있다면)
    const tagInput = document.getElementById("playerTag");

    }

    await login();
    await loadLeaderboard();
};


// [3] 플레이어 태그 생성 및 표시
function initializePlayerTag() {
    let savedTag = localStorage.getItem('player_tag');
    if (!savedTag) {
        savedTag = '#' + Math.floor(1000 + Math.random() * 9000);
        localStorage.setItem('player_tag', savedTag);
    }
    const tagInput = document.getElementById('playerTag');
    if (tagInput) {
        tagInput.value = savedTag;
        tagInput.readOnly = true;
    }
}

// [4] 세션 로그인
async function login() {
    try {
        const res = await fetch(`${vconfig.BASE_URL}/v2/session/guest`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ game_key: vconfig.GAME_KEY, game_version: vconfig.GAME_VERSION })
        });
        const data = await res.json();
        if (data.session_token) sessionToken = data.session_token;
    } catch (e) {
        console.error("로그인 에러:", e);
    }
}

// [5] 랭킹 로딩 - 이름 표시 버전
async function loadLeaderboard() {
    if (!sessionToken) return;

    try {
        const res = await fetch(`${vconfig.BASE_URL}/leaderboards/${vconfig.LEADERBOARD_KEY}/list?count=13`, {
            headers: {
                "x-session-token": sessionToken
            }
        });

        const data = await res.json();
        const tbody = document.getElementById("leaderboardBody");

        if (!tbody) return;

        if (data.items && data.items.length > 0) {
            tbody.innerHTML = data.items.map(item => {
                const displayName =
                    item.player?.name ||
                    item.player?.public_uid ||
                    item.member_id ||
                    "Unknown";

                return `
                    <tr>
                        <td class="rank-num">${item.rank}</td>
                        <td>${displayName}</td>
                        <td>${item.score}</td>
                    </tr>
                `;
            }).join('');
        } else {
            tbody.innerHTML = `
                <tr>
                    <td colspan="3">랭킹 데이터가 없습니다.</td>
                </tr>
            `;
        }

    } catch (e) {
        console.error("랭킹 로드 에러:", e);
    }
}


// [3] 핵심: 이름(닉네임+태그)을 서버에 저장하고 점수 제출
async function onGameOverAndSubmit(finalScore) {
    const name = document.getElementById("playerTitle").value.trim();
    const tag = localStorage.getItem("player_tag");
    const fullName = `${name}${tag}`;

    if (!name) return alert("닉네임을 입력하세요!");

    // 1. 플레이어 이름 세팅 (PATCH)
    await fetch(`${vconfig.BASE_URL}/player/name`, {
        method: "PATCH",
        headers: {
            "Content-Type": "application/json",
            "LL-Version": "2021-03-01",
            "x-session-token": sessionToken
        },
        body: JSON.stringify({ name: fullName })
    });

    // 2. 점수 제출 (POST)
    const res = await fetch(`${vconfig.BASE_URL}/leaderboards/${vconfig.LEADERBOARD_KEY}/submit`, {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "x-session-token": sessionToken
        },
        body: JSON.stringify({ score: parseInt(finalScore) })
    });

    if (res.ok) {
        alert("🎉 랭킹 등록 완료: " + fullName);
        await loadLeaderboard();
    }
}

// 등급별 가중치 확률 추출기 (Common: 50%, Rare: 30%, Epic: 15%, Legendary: 5%)
function getRandomBadge() {
    const rand = Math.random() * 100;
    
    // 0~50: Common (50%)
    // 50~80: Rare (30%)
    // 80~95: Epic (15%)
    // 95~100: Legendary (5%)
    let targetGrade = rand < 50 ? "Common" : 
                      rand < 80 ? "Rare" : 
                      rand < 95 ? "Epic" : "Legendary";
                      
    const filtered = badgePool.filter(b => b.grade === targetGrade);
    
    // 만약 해당 등급에 배지가 없을 경우를 대비한 안전장치
    return filtered.length > 0 
        ? filtered[Math.floor(Math.random() * filtered.length)] 
        : badgePool[0]; // 혹시라도 없으면 1번 배지 반환
}

    function getBossRewardBadge() {
    // 1. 보스 보상은 Epic(70%) + Legendary(30%)로 구성
    const rand = Math.random() * 100;
    let targetGrade = rand < 70 ? "Epic" : "Legendary";
    
    const filtered = badgePool.filter(b => b.grade === targetGrade);
    return filtered[Math.floor(Math.random() * filtered.length)];
}

async function initBadgeSelection() {
    await wait(500); // 0.5초 대기
    const overlay = document.getElementById("badgeInitOverlay");
    const container = document.getElementById("badgeInitContainer");
    container.innerHTML = "";
    
    // 무작위 배지 3개 추출
    const picks = [getRandomBadge(), getRandomBadge(), getRandomBadge()];
    
    picks.forEach((badge, index) => {
        const card = document.createElement("div");
        card.className = "reward-card badge-back";
        card.innerHTML = `
            <h3 class="question-mark">?</h3>
            <div class="info">
                <span style="color:${badge.color}; font-size:0.8rem; font-weight:bold;">[${badge.grade}]</span>
                <h3>${badge.name}</h3>
                <p>${badge.desc}</p>
            </div>
        `;
        
        card.onclick = () => {
            if (card.classList.contains("revealed")) return;
            
            // 1. 클릭한 카드 뒤집기 연출
            revealCard(card, badge);
            
            // 2. 1초 뒤 나머지 카드 전체 공개 및 3개 모두 일괄 획득 처리
            setTimeout(() => {
                const allCards = container.querySelectorAll(".reward-card");
                allCards.forEach((c, i) => revealCard(c, picks[i]));
                
                // 3개 강제 인벤토리 세팅 및 데이터 가동
                picks.forEach(p => {
                    if (p.isPassive) {
                        playerBadges.push(p); // 패시브만 가방에 추가
                        applyInstantBadgeEffect(p);
                    } else {
                        applyInstantBadgeEffect(p); // 액티브는 효과만 즉시 발동
                       
                    }
                });


                updateBadgeUI();
                
                log("🎁 스타팅 배지 3개가 등록되었습니다!");
                
                // 2초 후 오버레이 페이드 아웃
                setTimeout(() => { overlay.style.display = "none"; }, 2000);
            }, 1000);
        };
        container.appendChild(card);
    });
    overlay.style.display = "flex";
}

function revealCard(card, badge) {
    card.classList.remove("badge-back");
    card.classList.add("revealed");
    card.style.borderColor = badge.color;
    const qMark = card.querySelector(".question-mark");
    if (qMark) qMark.style.display = "none";
}

function initGrid() {
  const grid = document.getElementById("battleGrid");
  grid.innerHTML = ""; // 초기화

  for (let i = 0; i < 36; i++) { // 36칸으로 변경
    const cell = document.createElement("div");
    cell.className = "cell";
    
    // 좌표 계산 (6x6)
    const x = i % 6;
    const y = Math.floor(i / 6);
    
    cell.addEventListener("dragover", e => { e.preventDefault(); cell.classList.add("dragover"); });
    cell.addEventListener("dragleave", () => cell.classList.remove("dragover"));

    
    
    cell.addEventListener("drop", e => {
      e.preventDefault();
      cell.classList.remove("dragover");

        // 1. [핵심] 이미 유닛이 들어있는 셀인지 확인!
      if (cell.dataset.char) {
          log("⚠️ 이미 유닛이 배치된 곳입니다!");
          // 여기서 dragging 클래스만 제거해서 카드가 다시 돌아오게 할 수 있습니다.
        document.querySelector(".dragging")?.classList.remove("dragging");
          return; // 여기서 함수를 멈춰서 배치를 막음
      }
      
      const rawData = JSON.parse(e.dataTransfer.getData("text"));
      const data = { ...rawData };
      data.uniqueId = 'char_' + Date.now() + '_' + Math.floor(Math.random() * 1000);
      
      // [중요] y좌표를 보고 진영 판별 (0,1,2행=플레이어 / 3,4,5행=적)
      // 드롭 시점 (initGrid 내부)
      data.x = x; 
      data.y = y;
      data.side = 'player'; 
      data.maxHp = data.hp;
      data.range = data.range ;

      // 코스트 제한 체크
      const grade = data.grade || "N";
      const cost = COST_TABLE[grade] || 0;
      
      // 현재 배치된 유닛들 중 같은 진영의 코스트 합계 계산
      let currentCost = 0;
      document.querySelectorAll("#battleGrid .cell").forEach(c => {
        if (c.dataset.char) {
          let d = JSON.parse(c.dataset.char);
          if (d.side === data.side) currentCost += COST_TABLE[d.grade] || 0;
        }
      });

      if (currentCost + cost > (data.side === 'player' ? PLAYER_COST_LIMIT : ENEMY_COST_LIMIT)) {
        alert(`${data.side === 'player' ? '플레이어' : '적군'} 코스트 초과!`);
        return;
      }

      // 데이터 및 화면 적용
      cell.dataset.char = JSON.stringify(data);
      cell.innerHTML = `
        <div class="char-grid placed">
          <div class="hpbar"><div class="hpfill" style="width:100%"></div></div>
          <img src="${data.img}" alt="${data.name}">
          <div class="grade-badge ${grade}">${data.grade}</div>
        </div>`;

      if (grade === "UR") cell.classList.add("UR-active");
      
      const draggedEl = document.querySelector(".dragging");
      if (draggedEl) draggedEl.remove();
      updateCostDisplay();

      

      // [추가] 배치 완료 후, 선택창(`playerChars`)이 비었는지 확인
    const playerCharsContainer = document.getElementById("playerChars");
    
    // 선택창에 남아있는 .char-card 개수를 셉니다.
    const remainingCards = playerCharsContainer.querySelectorAll(".char-card").length;
   
      });

        
        grid.appendChild(cell);
      }
    }

function updateCostDisplay(){

window.isBossRound = false;

async function prepareRound(round) {
    // 1️⃣ 보스 라운드 판별
    window.isBossRound = (round % 10 === 0);

    if (window.isBossRound) {
        log(`📢 [ALERT] 라운드 ${round}: 강력한 월드 보스가 출현합니다!! 🚨`);
    } else {
        log(`라운드 ${round} 준비: 적 스폰 중...`);
    }

    let users = await fetchSheetData(); 
    if (!users) return;

    const enemyMaster = users.find(u => u.nickname === "스으리슬쩍");
    if (!enemyMaster) {
        console.error("적군 데이터를 가진 유저를 찾을 수 없습니다.");
        return;
    }
    
    const nGradeCard = enemyMaster.cards.find(c => c.grade === "N");
    const nGradeImg = nGradeCard ? nGradeCard.img : CONFIG.FALLBACK_IMAGE;

    const cells = Array.from(document.querySelectorAll("#battleGrid .cell"));
    const emptyEnemyCells = cells.filter((c, index) => {
        const y = Math.floor(index / 6); 
        return y <= 4 && !c.dataset.char;
    });

    let spawnCount, enemyName, hp, atk, range, enemyImg, borderStyle, glowStyle;

    // 2️⃣ 보스 vs 일반 분기
    if (window.isBossRound) {
        spawnCount = 1;
        enemyName = `👑👑 [WORLD BOSS] 초 미소녀 멘헤라 애리 Lv.${round}`;
        
        if (round >= 75) { hp = (8000 + (round * 3000)) * 8; atk = (500 + (round * 400)) * 5; }
        else if (round >= 48) { hp = (4000 + (round * 2000)) * 6; atk = (100 + (round * 200)) * 3; }
        else { hp = (4000 + (round * 2000)) * 4; atk = (100 + (round * 150)) * 2; }
        
        range = 4;
        enemyImg = (enemyMaster.cards.find(c => c.grade.toUpperCase() === "UR") || 
                    enemyMaster.cards.find(c => c.grade.toUpperCase() === "SSR") || 
                    enemyMaster.cards.find(c => c.grade.toUpperCase() === "SR") || 
                    {img: CONFIG.FALLBACK_IMAGE}).img;

        borderStyle = "5px ridge #ef4444";
        glowStyle = "0 0 25px #ef4444, inset 0 0 15px #ef4444";

    } else {
        const cycle = (round - 1) % 10;
        spawnCount = Math.min(emptyEnemyCells.length, cycle + 2);
        
        enemyName = `오염된 밤티 애리 Lv.${round}`;
        
        if (round >= 80) { hp = 1000 + (round * 1500); atk = 100 + (round * 400); }
        else if (round >= 40) { hp = 500 + (round * 800); atk = 50 + (round * 200); }
        else { hp = 500 + (round * 500); atk = 50 + (round * 100); }
        
        range = 2;
        enemyImg = nGradeImg;

        // 일반 몹 테두리 이펙트
        const roundStep = round % 10;
        if (roundStep >= 7) {
            borderStyle = "3px dashed #a855f7";
            glowStyle = "0 0 10px #a855f7";
        } else if (roundStep >= 4) {
            borderStyle = "3px solid #3b82f6";
            glowStyle = "0 0 6px #3b82f6";
        } else {
            borderStyle = "2px solid #ff5555";
            glowStyle = "none";
        }
    }

    // 3️⃣ 빈 칸 무작위 배치 및 생성
    emptyEnemyCells.sort(() => Math.random() - 0.5);

    for (let i = 0; i < spawnCount; i++) {
        const targetCell = emptyEnemyCells[i];
        if(!targetCell) continue; // 안전장치
        
        const cellIndex = cells.indexOf(targetCell);
        
        const enemyData = {
            uniqueId: `enemy_${round}_${i}_${Date.now()}`,
            name: enemyName,
            side: "enemy",
            grade: window.isBossRound ? "UR" : "N",
            hp: hp,
            maxHp: hp,
            atk: atk,
            range: range,
            x: cellIndex % 6,
            y: Math.floor(cellIndex / 6),
            img: enemyImg 
        };

        targetCell.dataset.char = JSON.stringify(enemyData);
        targetCell.innerHTML = `
            <div style="position: relative; width: 100%; height: 100%;">
                <img src="${enemyData.img}" style="width:100%; height:100%; object-fit:cover; border-radius:8px; border: ${borderStyle}; box-shadow: ${glowStyle};">
                <div class="hpbar" style="position:absolute; bottom:-10px; left:0; width:100%; height:8px; background:#333; border-radius:4px; overflow:hidden;">
                    <div class="hpfill" style="width:100%; height:100%; background:red; transition: width 0.2s;"></div>
                </div>
            </div>
        `;
    }
    
    if (window.isBossRound) {
        log(`😱 경고: 전쟁터에 압도적인 에너지를 가진 보스가 출현했습니다! 무찌르세요!`);
    } else {
        log(`적 ${spawnCount}마리가 나타났습니다!`);
    }
}

function shootProjectile(fromCell, toCell,type){
  const config = EFFECT_CONFIGS[type];
  const container = document.querySelector(".container"); // 부모 컨테이너
  const proj = document.createElement("div");
// 공통 클래스 + 타입별 클래스
  proj.className = `projectile ${type}`;

  // 1. 개별 프레임 크기 (size)
  const size = config.size;

  // 2. 전체 스프라이트 시트의 물리적 크기 계산
  const totalWidth = size * config.cols;
  const totalHeight = size * config.rows;

// 타입별 스타일을 CSS 변수로 적용
  proj.style.setProperty('--url', `url('${config.url}')`);
  proj.style.setProperty('--size', `${config.size}px`);
  proj.style.setProperty('--frames', config.frameCount);

    // 그리드 정보가 있다면 전달, 없다면 기본값(1) 적용
  proj.style.setProperty('--rows', config.rows || 1);
  proj.style.setProperty('--cols', config.cols || 1);
  proj.style.setProperty('--total-size', `${totalWidth}px ${totalHeight}px`);

  container.appendChild(proj);
  


  // 시작 위치 (셀의 정중앙, 부모 기준 좌표)
  const startX = fromCell.offsetLeft + (fromCell.offsetWidth / 2)- (config.size/2);
  const startY = fromCell.offsetTop  + (fromCell.offsetHeight / 2)- (config.size/2);

  proj.style.left = startX + "px";
  proj.style.top  = startY + "px";

requestAnimationFrame(() => { 
    const endX = toCell.offsetLeft + (toCell.offsetWidth / 2) - (config.size / 2);
    const endY = toCell.offsetTop + (toCell.offsetHeight / 2) - (config.size / 2);
    proj.style.left = endX + "px";
    proj.style.top = endY + "px";
  });

  setTimeout(()=>proj.remove(),1600);
}

// 캐릭터 DOM 생성 함수
function createCharDiv(card){
  const charDiv = document.createElement("div");
  charDiv.className = "char-card";
  charDiv.draggable = true;

   // 등급별 체력 설정
  let hp = 0;
  let range = 0; // 기본 사거리
  let atkmult = 0; // 공격력 배율
  switch(card.grade.toUpperCase()){
    case "N":
      hp = 5000;
      range = 2;
      atkmult =0.5;
      break;
    case "R":
      hp = 7000;
      range = 2; 
      atkmult =0.5; 
      break;
    case "S":
      hp = 10000;
      range = 3;
      atkmult =0.5;
      break;
    case "SR":
      hp = 20000;
      range = 5;
      atkmult =0.65;
      break;
    case "SSR":
      hp = 30000;
      range = 10;
      atkmult =0.5;
      break;
    case "UR":
      hp = 50000;
      range = 2;
      atkmult =1.2;
      break;
    default:
      hp = 80; // 알 수 없는 등급일 때 기본값
  }
  // 코스트 계산
  const cost = COST_TABLE[card.grade.toUpperCase()] || 0;
  // 데이터 세팅
  charDiv.dataset.name  = card.name;
  charDiv.dataset.grade = card.grade;
  charDiv.dataset.hp    = hp;
  charDiv.dataset.atk   = card.power*atkmult;
  charDiv.dataset.img   = card.img;
  charDiv.dataset.range = range;   // 기본 사거리 1로 설정 (필요에 따라 조정 가능)

// 카드 HTML 구조
  charDiv.innerHTML = `
    <div class="char-header">
      <span class="grade-badge">${card.grade}</span>
      <span class="cost-display">★:${cost}</span>
    </div>
    <img src="${charDiv.dataset.img}" class="char-img" alt="${card.name}">
    <div class="char-name">${card.name}</div>
    <div class="char-power">
      <i class="fa-solid fa-bolt"></i> ${card.power.toLocaleString('ko-KR')}
    </div>
  `;
  // 드래그 이벤트 등록
  charDiv.addEventListener("dragstart", e=>{
    

    const data = {
      name: charDiv.dataset.name,
      grade: charDiv.dataset.grade,   // 코스트 계산용 등급
      hp: parseInt(charDiv.dataset.hp),
      atk: parseInt(charDiv.dataset.atk),
      range: parseInt(charDiv.dataset.range),
      img: charDiv.dataset.img
    };
    charDiv.classList.add("dragging");
    e.dataTransfer.setData("text", JSON.stringify(data));
  });
   // ✅ 드랍 성공 시 원본 제거
  const draggedEl = document.querySelector(".dragging");
  if(draggedEl) draggedEl.remove();

  return charDiv;
}

// 구글 시트 데이터 Fetch 및 파싱 로직
async function fetchSheetData() {
    const url = `https://docs.google.com/spreadsheets/d/${CONFIG.SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(CONFIG.SHEET_NAME)}`;

    try {
          const response = await fetch(url);
        if (!response.ok) {
            throw new Error(`HTTP 오류: ${response.status}`);
        }
        const text = await response.text();
        const match = text.match(/google\.visualization\.Query\.setResponse\(([\s\S\w]+)\);/)[1];
        if (!match) {
            throw new Error("구글 시트 응답 형식이 올바르지 않습니다.");
        }
        const data = JSON.parse(match);

        // Optional Chaining (?.)과 Reduce를 활용해 데이터를 안전하고 빠르게 그룹화
        const userMap = data.table.rows.reduce((acc, row) => {
            const nickname = row?.c?.[0]?.v;
            
            // 유효하지 않은 행이거나 헤더인 경우 스킵
            if (!nickname || nickname === '닉네임') return acc;

            const grade = row?.c?.[2]?.v || 'N';
            const cardName = row?.c?.[3]?.v || '알수없음';
            const power = parseInt(row?.c?.[4]?.v) || 0;
            // 구글 시트 6번째 열(F열, 인덱스 5)에서 실제 이미지 링크 가져오기
            const imgUrl = row?.c?.[5]?.v || CONFIG.FALLBACK_IMAGE;

            if (["A","B","C"].includes(grade.toUpperCase())) return acc;

            if (!acc[nickname]) {
                acc[nickname] = { nickname, totalPower: 0, cards: [] };
            }

            acc[nickname].cards.push({
                name: cardName,
                grade: grade,
                power: power,
                img: imgUrl // 실제 구글 시트의 이미지 링크 사용
            });
            acc[nickname].totalPower += power;

            return acc;
        }, {});

        return Object.values(userMap);
    } catch (error) {
        console.error("구글 시트 연동 오류:", error);
        return null; // 에러 발생 시 null 반환
    }
}


 const COST_TABLE = {
  "N":0,

function removeSpecificChar(uniqueId) {
    // 모든 셀을 검사해서 해당 ID를 가진 놈만 지운다!
    document.querySelectorAll(".cell").forEach(cell => {
        if (cell.dataset.char) {

            if (charData.uniqueId === uniqueId) {

// [실시간 보충] 내 카드 뭉치에서 랜덤으로 카드를 뽑아 화면에 추가 배치
// =========================================================================
function refillPlayerCard(amount = 1) {
    const playerDiv = document.getElementById("playerChars");
    if (!playerDiv) return;

    // 안전장치: 구글 시트 조회를 아직 안 했거나 카드가 없는 경우
    if (!globalPlayerCards || globalPlayerCards.length === 0) {
        log("⚠️ 구글 시트에서 캐릭터 데이터를 먼저 불러와야 카드를 보충할 수 있습니다!");
        return;
    }

    for (let i = 0; i < amount; i++) {
        // 1. 내 카드 풀(배열)에서 랜덤으로 인덱스 하나 추출
        const randomIndex = Math.floor(Math.random() * globalPlayerCards.length);
        const randomCard = globalPlayerCards[randomIndex];

        // 2. 이미 짜놓으신 [훌륭한 DOM 생성 함수]를 그대로 재활용하여 카드 생성!
        const newCharDiv = createCharDiv(randomCard);
        
        // 3. innerHTML = "" 로 지우지 않고, appendChild를 통해 기존 카드들 옆에 슬쩍 '보충'합니다.
        playerDiv.appendChild(newCharDiv);
        
        log(`🔄 [카드 충전] 덱에 [${randomCard.grade}] ${randomCard.name} 카드가 추가되었습니다!`);
    }
}






// 공격자 위치 계산용 헬퍼 (함수 밖에 선언하거나 상단에 두세요)
function getGridPos(cell) {
 const cells = Array.from(document.querySelectorAll("#battleGrid .cell"));
    const index = cells.indexOf(cell);
    return { x: index % 6, y: Math.floor(index / 6) };
}





// 🔥 [백엔드 주입 5] 신속 이동 효과 연동형 이동 엔진
function moveUnit(unit, fromCell, allUnitsOnBoard) {
    const hasSpeedBadge = playerBadges.some(b => b.type === "speed");
    // 신속 이동 배지 소지 시 아군은 루프가 2번 돌아 한 턴에 총 2칸 고속 전진함
    const moveCount = (unit.side === 'player' && hasSpeedBadge) ? 2 : 1;
    let currentFromCell = fromCell;

    for (let i = 0; i < moveCount; i++) {
        const posA = getGridPos(currentFromCell);
        let nearestTarget = null;
        let minD = Infinity;

        allUnitsOnBoard.filter(t => t.hp > 0 && t.side !== unit.side).forEach(t => {
            const toCell = [...document.querySelectorAll("#battleGrid .cell")]
                .find(c => c.dataset.char && JSON.parse(c.dataset.char).uniqueId === t.uniqueId);
            if (!toCell) return;
            const posB = getGridPos(toCell);
            const dist = Math.abs(posA.x - posB.x) + Math.abs(posA.y - posB.y);
            if (dist < minD) { minD = dist; nearestTarget = toCell; }
        });

        if (nearestTarget) {
            const posB = getGridPos(nearestTarget);
            const nextPos = {
                x: posA.x + Math.sign(posB.x - posA.x),
                y: posA.y + Math.sign(posB.y - posA.y)
            };
            
            const nextCell = [...document.querySelectorAll("#battleGrid .cell")]
                .find(c => getGridPos(c).x === nextPos.x && getGridPos(c).y === nextPos.y);
                
            if (nextCell && !nextCell.dataset.char) {
                const isUR = currentFromCell.classList.contains("UR-active");
                let unitData = JSON.parse(currentFromCell.dataset.char);
                
                const newPos = getGridPos(nextCell);
                unitData.x = newPos.x; unitData.y = newPos.y;
                
                nextCell.dataset.char = JSON.stringify(unitData);
                nextCell.innerHTML = currentFromCell.innerHTML;
                
                if (isUR) {
                    currentFromCell.classList.remove("UR-active");
                    nextCell.classList.add("UR-active");
                }
                currentFromCell.innerHTML = "";
                delete currentFromCell.dataset.char;
                currentFromCell = nextCell; // 연속 이동 포지션 갱신
            } else {
                break; 
            }
        }
    }
}

var GLOBAL_ATK_MULT = 1.0; // 전역 공격력 배율 변수 (초기값 1.0)



function findTargetsInRange(unit, allUnits) {
    // 1. 공격자의 현재 좌표는 매개변수로 넘어온 unit 객체에서 바로 가져옵니다.
    // allUnits에서 다시 find할 필요가 없습니다. (이미 데이터가 갱신되어 들어오기 때문)
    const posA = { x: unit.x, y: unit.y };

    // 2. 사거리 내 타겟 필터링
    return allUnits.filter(target => {
        // 본인과 같은 진영이거나, 이미 죽은(hp <= 0) 적은 제외
        if (target.side === unit.side || target.hp <= 0) return false;
        
        // 맨해튼 거리 계산 (가로 차이 + 세로 차이)
        const dist = Math.abs(posA.x - target.x) + Math.abs(posA.y - target.y);
        
        // 디버깅용 로그 (이름 확인 없이 모든 유닛에 대해 로그 출력 가능)
        // console.log(`${unit.name}이 바라보는 ${target.name}과의 거리: ${dist} (사거리:${unit.range})`);
        
        return dist <= unit.range;
    });
}

const wait = (ms) => new Promise(resolve => setTimeout(resolve, ms));

// =========================================================================
// [3단계 & 백엔드] 인게임 전투 루프 내 실시간 배지 판정 주입
// =========================================================================
async function startBattle() {
    if (isBattleRunning) return;
    isBattleRunning = true;
    log("=== 전투 시작 ===");
    if (isRoundCleared()) {
        log(`스테이지 ${currentRound}  적이 몰려옵니다...`);
        prepareRound(currentRound);
    }
    await wait(500); // 0.5초 대기

    let round = 1;
    const interval = setInterval(() => {
        let moveQueue = [];
        
        // 현재 필드 위 유닛 데이터 수집 파트
        const allUnits = Array.from(document.querySelectorAll("#battleGrid .cell"))
            .filter(c => c.dataset.char)
            .map(c => JSON.parse(c.dataset.char));

        let players = allUnits.filter(u => u.side === 'player');
        let enemies = allUnits.filter(u => u.side === 'enemy');

        // ------------------------------------------------
        // [아군(Player) 행동 턴]
        // ------------------------------------------------
        players.filter(p => p.hp > 0).forEach(p => {
            const currentCell = document.querySelector(`[data-char*='"uniqueId":"${p.uniqueId}"']`);
            if (!currentCell) return;
            let pCurrent = JSON.parse(currentCell.dataset.char);
            
            // 🔥 [백엔드 주입 1] 탄막 강화 & 사거리 증폭 실시간 수식 변조
            playerBadges.forEach(badge => {
                 pCurrent.atk = Math.floor(pCurrent.atk * GLOBAL_ATK_MULT);
                if (badge.type === "range") pCurrent.range += badge.value;
            });

            const targets = findTargetsInRange(pCurrent, allUnits);
            if (targets.length > 0) {
                const target = targets[0];
                
                // 🔥 [백엔드 주입 2] 치명적 탄막 (확률형 크리티컬 데미지 배율 연산)
                let finalDamage = pCurrent.atk;
                let isCrit = false;
                const critBadge = playerBadges.find(b => b.type === "crit");
                if (critBadge && Math.random() < critBadge.value) {
                    finalDamage *= 2;
                    isCrit = true;
                }

                target.hp = Math.max(0, target.hp - finalDamage);
                
                // UI 갱신 유도용 백엔드 동기화 처리
                const targetCell = document.querySelector(`[data-char*='"uniqueId":"${target.uniqueId}"']`);
                if (targetCell) {
                    targetCell.dataset.char = JSON.stringify(target);
                    const hpbar = targetCell.querySelector(".hpfill");
                    if (hpbar) hpbar.style.width = ((target.hp / target.maxHp) * 100) + "%";

                    if (target.hp <= 0) {
                        targetCell.innerHTML = "";
                        targetCell.classList.remove("UR-active");
                        delete targetCell.dataset.char;
                        addScore(currentRound * 100);
                        updateCostDisplay();
                    }
                }
                    // =========================================================================
                    // 🔥 [백엔드 주입 - 흡혈 로직] 가한 피해량의 일부를 내 HP로 전환!
                    // =========================================================================
                    const vampireBadge = playerBadges.find(b => b.type === "vampire");
                    if (vampireBadge && pCurrent.hp > 0) {
                        // 최대 체력(maxHp)을 넘지 않는 선에서 회복량 계산
                        const healAmount = Math.floor(finalDamage * vampireBadge.value);
                        
                        if (healAmount > 0) {
                            const oldHp = pCurrent.hp;
                            pCurrent.hp = Math.min(pCurrent.maxHp, pCurrent.hp + healAmount);
                            const actualHeal = pCurrent.hp - oldHp; // 실제 회복된 양

                            // 갱신된 아군의 체력 데이터를 DOM(셀)에 다시 저장!! (이걸 안 하면 체력이 안 변함)
                            currentCell.dataset.char = JSON.stringify(pCurrent);

                            // 아군 체력바 UI 실시간 새로고침
                            const pCurrentHpbar = currentCell.querySelector(".hpfill");
                            if (pCurrentHpbar) {
                                pCurrentHpbar.style.width = ((pCurrent.hp / pCurrent.maxHp) * 100) + "%";
                            }

                            // 흡혈 성공 로그 추가 출력 (원한다면 위트 있는 드립으로 커스텀 가능)
                            if (actualHeal > 0) {
                                log(`🩸 [정기 흡수] ${pCurrent.name}이(가) 권능을 통해 정기로 ${actualHeal} 만큼 체력을 회복했습니다! (${pCurrent.hp}/${pCurrent.maxHp})`);
                            }
                        }
                    }


                
                // 🔥 [교체 적용 1] 아군 공격 로그를 유머 생성기로 대체!
                const combatLog = getRandomAttackLog(pCurrent, target, finalDamage, isCrit);
                log(combatLog);

                if (currentCell && targetCell) shootProjectile(currentCell, targetCell, pCurrent.grade);
            } else {
                moveQueue.push({ unit: pCurrent, cell: currentCell });
            }
        });

        // ------------------------------------------------
        // [적군(Enemy) 행동 턴]
        // ------------------------------------------------
        enemies.filter(e => e.hp > 0).forEach(e => {
            const fromCell = document.querySelector(`[data-char*='"uniqueId":"${e.uniqueId}"']`);
            if (!fromCell) return;
            const eCurrent = JSON.parse(fromCell.dataset.char);
            
            const targets = findTargetsInRange(eCurrent, allUnits);
            if (targets.length > 0) {
                const target = targets[0];

                // 🔥 [교체 및 위치 조정 2] 시간 정지 배지 체크를 타겟 확보 직후로 이동!
                const slowBadge = playerBadges.find(b => b.type === "slow");
                if (slowBadge && Math.random() < slowBadge.value) {
                    // 데미지를 0으로 넘겨 행동 불발/시간 정지 전용 드립을 출력합니다.
                    const missLog = getRandomAttackLog(eCurrent, target, 0);
                    log(missLog);
                    return; 
                }
                
                // 🔥 [백엔드 주입 4] 방어막 전개 (아군이 최종 피격 시 데미지 30% 감쇄 연산)
                let enemyDamage = eCurrent.atk;
                   // 1. 방어 배지들을 모두 찾습니다.
            const shieldBadges = playerBadges.filter(b => b.type === "shield");
            
            if (shieldBadges.length > 0) {
                // 2. [점감 공식] 각 배지의 (1 - value)를 계속 곱하여 최종 배율을 계산합니다.
                // 예: value가 0.5라면 (1 - 0.5) = 0.5씩 곱해짐
                const totalMultiplier = shieldBadges.reduce((acc, b) => acc * (1 - b.value), 1.0);
                
                // 3. 최종 대미지 적용 (소수점 버림, 최소 대미지 1)
                enemyDamage = Math.max(1, Math.floor(enemyDamage * totalMultiplier));
            
                            target.hp = Math.max(0, target.hp - enemyDamage);
                
                const targetCell = document.querySelector(`[data-char*='"uniqueId":"${target.uniqueId}"']`);
                if (targetCell) {
                    targetCell.dataset.char = JSON.stringify(target);
                    const hpbar = targetCell.querySelector(".hpfill");
                    if (hpbar) hpbar.style.width = ((target.hp / target.maxHp) * 100) + "%";

                    if (target.hp <= 0) {
                        targetCell.innerHTML = "";
                        targetCell.classList.remove("UR-active");
                        delete targetCell.dataset.char;
                        updateCostDisplay();
                    }
                }

                // 🔥 [교체 적용 3] 적군 공격 로그를 유머 생성기로 대체!
                const combatLog = getRandomAttackLog(eCurrent, target, enemyDamage);
                log(combatLog);

                if (fromCell && targetCell) shootProjectile(fromCell, targetCell, eCurrent.grade);
            } else {
                moveQueue.push({ unit: eCurrent, cell: fromCell });
            }
        });

        // 이동 큐 처리 실행
        moveQueue.forEach(item => moveUnit(item.unit, item.cell, allUnits));

        // ------------------------------------------------
        // [라운드 클리어 및 루프 종료 판정]
        // ------------------------------------------------
        if (isRoundCleared()) {
            clearInterval(interval); 
            isBattleRunning = false;
            log(`🎉 스테이지 ${currentRound} 클리어 성공!`);

                      // 클리어 후 100라운드 초과 여부 체크
                if (currentRound >= 100) {
                    gameClear();
                    return;
                }
            if (isRounddefeat()) {
                const remainingCards = document.querySelectorAll("#playerChars .char-card").length;
                if (remainingCards === 0) {
                    log("❌ 카드가 없고 아군이 전멸했습니다. 게임 오버!");
                    clearInterval(interval);
                    isBattleRunning = false;
                    gameOver(); 
                    return;
                }
        
            }
    
            setTimeout(() => { showRoundRewards(); }, 1000); 
            return;
        } else if (isRounddefeat()) {
            const remainingCards = document.querySelectorAll("#playerChars .char-card").length;

            if (remainingCards === 0) {
                log("❌ 카드가 없고 아군이 전멸했습니다. 게임 오버!");
                clearInterval(interval);
                isBattleRunning = false;
                gameOver(); 
                return;
            } else {
                log(`스테이지 ${currentRound} 패배! 남은 카드로 재정비하세요.`);
                clearInterval(interval);
                isBattleRunning = false;
                currentRound++; 
                log(`전투가 멈췄습니다. 카드를 배치하고 다시 '전투 시작'을 누르세요.`);
                return;
            }
        }

        round++;
    }, 1000);
}
function getRandomAttackLog(attacker, target, damage, isCrit = false) {
    const isBoss = attacker.name.includes("BOSS");
    const isUR = attacker.grade === "UR";

    if (damage <= 0) {
        const missLogs = [
            `💨 ${target.name}이(가) 회피! "어라? 춤추는 줄?"`,
            `💤 ${attacker.name}의 헛손질! "방금 뭐 함?"`,
            `🛡️ ${target.name}이 가볍게 댄스로 회피!`,
            `🤫 공격 증발! ${attacker.name}의 뇌정지 발동.`
        ];
        return missLogs[Math.floor(Math.random() * missLogs.length)];
    }

    if (isBoss) {
        const bossLogs = [
            `🚨 [BOSS] ${attacker.name}의 광역 폭격! (-${damage})`,
            `💀 [BOSS] ${attacker.name}이 ${target.name}을(를) 구겼습니다! (-${damage})`,
            `🔥 [BOSS] ${attacker.name}의 압도적 멘탈 분쇄! (-${damage})`
        ];
        return bossLogs[Math.floor(Math.random() * bossLogs.length)];
    }

    if (isCrit) {
        const critLogs = [
            `🎯 [CRIT] 명치에 죽빵! (-${damage})`,
            `🔥 [CRIT] 꿀밤 한 대가 핵폭탄급! (-${damage})`,
            `⚡ [CRIT] ${attacker.name}의 물리치료! (-${damage})`,
            `💥 [CRIT] 조상님 뵙고 왔습니다! (-${damage})`
        ];
        return critLogs[Math.floor(Math.random() * critLogs.length)];
    }

    if (isUR) {
        const urLogs = [
            `✨ [UR] 자본주의의 매운맛! (-${damage})`,
            `🌟 [UR] ${attacker.name}의 광채 쇼! (-${damage})`,
            `🔱 [UR] 신화급 참교육 시전! (-${damage})`
        ];
        return urLogs[Math.floor(Math.random() * urLogs.length)];
    }

    const normalLogs = [
        `🥊 ${attacker.name}의 등짝 스매시! (-${damage})`,
        `💥 ${attacker.name}의 뚝배기 브레이커! (-${damage})`,
        `⚔️ ${attacker.name}: "아프냐? 나도 아프다." (-${damage})`,
        `🚀 ${attacker.name}의 탄막 세례! (-${damage})`,
        `🐾 ${attacker.name}이 발가락을 밟았다! (-${damage})`
    ];
    return normalLogs[Math.floor(Math.random() * normalLogs.length)];
}




// =========================================================================
// [4단계] 라운드 승리 보상 부여 및 교체(Inventory 스왑) 처리 알고리즘
// =========================================================================
function showRoundRewards() {
    const overlay = document.getElementById("roundRewardOverlay");
    const container = document.getElementById("roundRewardContainer");
    container.innerHTML = "";
// 🔥 [수정] 보스 라운드라면 보스 전용 확률(Epic+), 아니면 일반 랜덤
    const picks = isBossRound 
        ? [getBossRewardBadge(), getBossRewardBadge(), getBossRewardBadge()] 
        : [getRandomBadge(), getRandomBadge(), getRandomBadge()];

  
    
    picks.forEach((badge, index) => {
        const card = document.createElement("div");
        card.className = "reward-card badge-back"; // 처음엔 물음표 뒤집힌 상태
   
        card.innerHTML = `
            <h3 class="question-mark">?</h3>
            <div class="info">
                <span style="color:${badge.color}; font-size:0.8rem; font-weight:bold;">[${badge.grade}]</span>
                
                <h3 style="margin: 5px 0;">
                    <span style="color: ${badge.isPassive ? '#60a5fa' : '#f87171'}; font-size:0.85rem;">
                        [${badge.isPassive ? '영구 패시브' : '즉시 발동'}]
                    </span> 
                    ${badge.name}
                </h3>
                
                <p>${badge.desc}</p>
            </div>
        `;
        
        card.onclick = () => {
            // 중복 클릭 및 연출 도중 다른 카드 클릭 방지 락(Lock)
            if (card.classList.contains("revealed") || container.classList.contains("selected-done")) return;
            container.classList.add("selected-done");
            
            // 1️⃣ [내가 고른 카드]를 먼저 앞면으로 싹 뒤집습니다.
            revealCard(card, badge);
            card.style.borderWidth = "3px"; // 내가 선택한 카드 두껍게 강조
            
            // 2️⃣ 0.8초 뒤, 고르지 않은 [옆 카드 2개]도 뒤집어서 보여줍니다. (구경용)
            setTimeout(() => {
                const allCards = container.querySelectorAll(".reward-card");
                allCards.forEach((c, i) => {
                    if (i !== index) {
                        revealCard(c, picks[i]);
                        c.style.opacity = "0.5"; // 안 고른 카드는 흐리게 해서 구경만 시킴
                    }
                });
                
                // 3️⃣ 구경이 끝난 1.5초 뒤, 보상 창을 닫고 인벤토리 처리로 라우팅합니다.
                setTimeout(() => {
                    overlay.style.display = "none"; // 보상 창 완전히 닫기
                    container.classList.remove("selected-done"); // 락 해제
                    
                    // 🔥 [핵심] 내가 고른 배지 데이터만 가방 검사(3칸 체크)로 넘깁니다!
                    tryAddBadge(badge, proceedToNextRound); 
                }, 1500);
                
            }, 800);
        };
        container.appendChild(card);
    });
    overlay.style.display = "flex";
}

async function tryAddBadge(newBadge, onComplete) {
    // 1️⃣ [추가] 만약 패시브가 아닌 일회성 즉시 발동 카드라면?
    if (newBadge.isPassive === false) {
        applyInstantBadgeEffect(newBadge); // 효과만 즉시 실행하고
        log(`⚡ 즉시 발동형 보상 적용 완료: ${newBadge.name}`);
        if (onComplete) onComplete();       // 가방 안 넣고 바로 다음 라운드로 진행!
        return; 
    }

    // 2️⃣ 기존의 패시브 가방 저장 로직 (3칸 체크)
    if (playerBadges.length < MAX_BADGE_SLOTS) {
        playerBadges.push(newBadge);   
        updateBadgeUI();                
        applyInstantBadgeEffect(newBadge); 
        log(`🎒 패시브 배지 장착 완료: ${newBadge.name}`);
        if (onComplete) onComplete();
    } else {
        openExchangeOverlay(newBadge, onComplete); 
    }
}

// =========================================================================
// [패시브 해제] 배지 파괴/교체 시 적용되어 있던 실시간 효과를 회수하는 함수
// =========================================================================
function removePassiveEffect(badge) {
    if (!badge || !badge.isPassive) return; // 패시브가 아니면 실행 안 함

    log(`🗑️ [패시브 파괴] '${badge.name}' 배지가 파괴되어 효과가 소멸합니다.`);

    if (badge.type === "bullet" && badge.grade === "Rare") {
        log(`✨ [영구 누적] 공포의 '${badge.name}'(레어) 아군의 공격력에 영구히 흡수되었습니다!`);
    } else {
        log(`🗑️ [패시브 파괴] '${badge.name}' 배지가 파괴되어 효과가 소멸합니다.`);
    }

    switch (badge.type) {
         case "bullet":
            // ✨ [핵심 로직] 레어 등급 불릿은 원상복구(나누기)를 건너뜁니다!
            if (badge.grade === "Rare") {
                // 아무것도 하지 않고 break -> GLOBAL_ATK_MULT 배율이 깎이지 않고 그대로 유지됨!
                break;
            }

            // 💥 일반 등급 불릿들은 기존처럼 회수 (원래대로 나누기)
            if (typeof GLOBAL_ATK_MULT !== 'undefined') {
                GLOBAL_ATK_MULT /= badge.value; 
                log(`⚔️ [버프 회수] 일반 불릿이 회수되어 총 공격력 배율이 [${GLOBAL_ATK_MULT.toFixed(2)}배]가 되었습니다.`);
            }
            break;

        case "range":
            // 💥 아군 공격 사거리 +1칸 회수
            if (typeof GLOBAL_RANGE_BONUS !== 'undefined') {
                GLOBAL_RANGE_BONUS -= badge.value;
            }
            break;

        case "shield":
            // 💥 피해량 30% 감소 효과 제거
            if (typeof GLOBAL_DAMAGE_REDUCTION !== 'undefined') {
                GLOBAL_DAMAGE_REDUCTION -= 0.3; // 0.7(30%감소) 받았던 걸 원상복구
            }
            break;

        case "crit":
            // 💥 치명타 확률 회수
            if (typeof GLOBAL_CRIT_CHANCE !== 'undefined') {
                GLOBAL_CRIT_CHANCE -= badge.value;
            }
            break;

        case "slow":
            // 💥 적 불발 확률 회수
            if (typeof ENEMY_SLOW_CHANCE !== 'undefined') {
                ENEMY_SLOW_CHANCE -= badge.value;
            }
            break;

        case "speed":
            // 💥 이동 보너스 해제
            if (typeof GLOBAL_SPEED_BONUS !== 'undefined') {
                GLOBAL_SPEED_BONUS = false;
            }
            break;

        case "vampire":
            // 🦇 실시간 체크 방식이라 배열에서 빠지면 자동으로 멈추지만, 
            // 유저에게 효과가 끝났음을 알리기 위해 로그를 남겨줍니다.
            log(`🦇 [배지 제거] '${badge.name}' 배지가 파괴되어 이제 아군들이 흡혈을 할 수 없습니다.`);
            break;
    }
    

}
function openExchangeOverlay(newBadge, onComplete) {
    const overlay = document.getElementById("badgeExchangeOverlay");
    const container = document.getElementById("badgeExchangeContainer");
    container.innerHTML = `<h3 style="width:100%; margin-bottom:15px;">새로 획득한 [${newBadge.name}] 배지를 장착하기 위해 버릴 배지를 골라주세요.</h3>`;
    
    playerBadges.forEach((oldBadge, index) => {
        const card = document.createElement("div");
        card.className = "reward-card revealed";
        card.style.borderColor = oldBadge.color;
        card.innerHTML = `
            <span style="color:#ef4444; font-weight:bold;">[교체 대상]</span>
            <h3>${oldBadge.name}</h3>
            <p>${oldBadge.desc}</p>
        `;
        
        card.onclick = async () => {
            log(`배지 스왑 완료: [${oldBadge.name}] 파괴 -> [${newBadge.name}] 장착`);
            
            // 🔥 [핵심 추가] 버려지는 기존 배지가 '영구 패시브(true)'였다면, 데이터를 바꾸기 전에 효과를 먼저 뺏어옵니다!
            if (oldBadge.isPassive) {
                removePassiveEffect(oldBadge);
            }

            playerBadges[index] = newBadge; // 데이터 스왑 (기존 자리에 새 배지 주입)
            updateBadgeUI();
            applyInstantBadgeEffect(newBadge); // 새 배지 효과 발동
            
            overlay.style.display = "none";
            if (onComplete) onComplete();
        };
        container.appendChild(card);
    });
    
    // 스킵 옵션 버튼 바인딩
    const skipBtn = document.createElement("button");
    skipBtn.innerText = "새 배지 버리고 그냥 넘어가기";
    skipBtn.style.cssText = "margin-top:20px; padding:12px; background:#64748b; color:white; border:none; border-radius:6px; cursor:pointer;";
    skipBtn.onclick = () => {
        log(`획득한 보상 [${newBadge.name}] 배지를 버렸습니다.`);
        overlay.style.display = "none";
        if (onComplete) onComplete();
    };
    container.appendChild(skipBtn);
    overlay.style.display = "flex";
}

function proceedToNextRound() {
    currentRound++;
    log(`다음 스테이지 ${currentRound} 준비 단계입니다. '전투 시작' 버튼을 누르세요.`);
}

// =======================================
// [5단계] UI 연동 실시간 시각화 처리 모듈 
// =======================================
function updateBadgeUI() {
    const ui = document.getElementById("badgeUI");
    
    // 혹시 모를 에러 방지용 안전장치
    if (!ui) {
        console.error("HTML에 id='badgeUI'를 가진 엘리먼트가 없습니다.");
        return;
    }
    
    ui.innerHTML = ""; // 기존 UI 초기화
    
    playerBadges.forEach(badge => {
        const icon = document.createElement("div");
        icon.className = "mini-badge";
        icon.style.borderColor = badge.color;
        icon.innerHTML = badge.name.substring(0, 2); // 배지 이름 앞 2글자만 노출
        icon.title = `${badge.name} [${badge.grade}]\n${badge.desc}`; // 마우스 올리면 툴팁 노출
        ui.appendChild(icon);
    });
}
