<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>애리체스</title>
  <style>
 body { 
  font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif; 
  background-color: #ffffff; /* 요청하신 순수 흰색 배경 */
  color: #1e293b;
  margin: 0;
  padding: 20px;
}

.container {
  display: flex;
  gap: 20px;
  justify-content: center;
  margin-top: 60px;
}

.left-panel { 
  width: 600px; 
  display: flex; 
  flex-direction: column; 
  gap: 15px; 
}

/* 배틀 그리드: 흰 배경에서 선명하게 보이도록 블루그레이 베이스 유지 */
.battleGrid {
  display: grid;
  grid-template-columns: repeat(6, 80px);
  grid-template-rows: repeat(6, 80px); 
  gap: 6px;
  background: #eaf0fa; 
  padding: 12px;
  border-radius: 12px;
  border: 2px solid #3b66f5; 
  box-shadow: 0 10px 30px rgba(59, 102, 245, 0.12);
  height: 520px; /* (80px * 6) + 12px(패딩) * 2 + 12px(gap) = 약 520px */
  flex-shrink: 0;
}

.cell {
  background: #ffffff;
  border: 1px solid #b4c6ef;
  border-radius: 8px;
  position: relative;
  overflow: visible;
  transition: all 0.2s ease;
  perspective: 600px;
}

.cell.dragover {
  border: 2px dashed #3b66f5;
  background: #f0f4fe;
}

/* 1. 셀(Cell) 자체의 바닥 발광 효과 */
.cell.UR-active {
  z-index: 10; /* 다른 셀보다 위로 보이게 */
  transition: all 0.5s ease;
}
/* 1. CSS 변수 선언 (브라우저에게 이 변수는 색상 데이터임을 알려줌) */
@property --aura-alpha {
  syntax: '<number>';
  inherits: false;
  initial-value: 0.6;
}

/* 2. 오로라 요소 위치 보정 */
.cell.UR-active::before {
  content: "";
  position: absolute;
  /* top/left를 사용해 정중앙으로 강제 고정 */
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%); 
  
  width: 105%;
  height: 105%;
/* 30% 지점에서 색이 시작되도록 조정 */
/* 변수(--aura-alpha)를 사용하여 색상 투명도를 설정 */
  background: radial-gradient(circle, 
    transparent 30%, 
    rgba(255, 0, 80, calc(var(--aura-alpha) + 0.3)) 50%, 
    rgba(180, 150, 255, var(--aura-alpha)) 80%, 
    transparent 100%
  );
  filter: blur(15px);
  animation: color-breath 4s infinite ease-in-out;
  pointer-events: none;
  z-index: 0; /* 카드보다 아래로 깔기 */
}

/* 2. 카드 테두리 애니메이션도 같은 톤으로 수정 */
.char-grid.placed.UR {
  border: 2px solid #ff0080 !important;
  box-shadow: 0 0 25px rgba(128, 0, 255, 0.6) !important;
  animation: card-float-purple 3s infinite ease-in-out;
}
/* 2. 변수를 애니메이션 시킴 */
@keyframes color-breath {
  0% { --aura-alpha: 0.2; }
  50% { --aura-alpha: 0.6; }
  100% { --aura-alpha: 0.2; }
}
@keyframes card-float-purple {
  0%, 100% { transform: rotateX(70deg) scale(1.4) translateY(0px); }
  50% { transform: rotateX(72deg) scale(1.42) translateY(-8px); }
}
.char-wrapper { 
  position: relative; 
  display: flex; 
  justify-content: center; 
}

/* 캐릭터 카드: 흰 배경 위에서 대비감이 살도록 테두리와 그림자 최적화 */
.char-card {
  width: 160px;
  border-radius: 10px;
  background: #ffffff;
  color: #1e293b;
  display: flex;
  flex-direction: column;
  align-items: center;
  cursor: grab;
  border: 2px solid #3b66f5; 
  box-shadow: 0 6px 16px rgba(59, 102, 245, 0.15); /* 그림자를 살짝 더 선명하게 */
  margin: 8px;
  overflow: hidden; 
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.char-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 10px 24px rgba(59, 102, 245, 0.25);
}

.char-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  width: 100%;
  padding: 6px 10px;
  box-sizing: border-box;
  background: #3b66f5; 
  color: #ffffff;
  font-weight: bold;
}

/* 등급 뱃지 */
.grade-badge {
  background: #ffffff;
  color: #3b66f5;
  padding: 1px 6px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 800;
}

/* 코스트 */
.cost-display {
  color: #ffca28; 
  font-size: 12px;
  font-weight: 700;
  text-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
}

.char-img {
  display: block;
  object-fit: contain;
  max-width: 110px;
  max-height: 110px;
  margin-top: 8px;
}

.char-name {
  margin-top: 6px;
  font-size: 14px;
  text-align: center;
  font-weight: 700;
  color: #1e3a8a;
}

.char-power {
  font-size: 12px;
  color: #64748b;
  margin-bottom: 10px;
}

.char-grid {
  position: relative;
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1; /* 오로라(0)보다 위에 배치 */
  
  /* 3D 효과를 위한 핵심 설정 */
  transform-style: preserve-3d;
  transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

/* 배치 완료된 상태 (JS로 .placed 클래스를 추가하세요) */
.char-grid.placed {
  transform: rotateX(-60deg) rotateY(0deg) scale(1);
  box-shadow: 10px 20px 30px rgba(0, 0, 0, 0.4);
}

.char-grid img {
  width: 80%;
  min-height: 50%;
  object-fit: contain;
  /* 카드 이미지도 3D 공간에 포함 */
  transform: translateZ(-40px);
}

.char-grid .grade-badge {
  position: absolute;
  top: -150px;

  left: 4px;
  background: #3b66f5;
  color: #ffffff;
  font-size: 15px;
  padding: 1px 4px;
  border-radius: 4px;
  
  /* 배지를 이미지보다 앞으로 튀어나오게 함 */
  transform: translateZ(35px);
  box-shadow: 2px 2px 5px rgba(0,0,0,0.2);
}
.grade-badge.N  { background: #9e9e9e; }
.grade-badge.R  { background: #4caf50; }
.grade-badge.SR { background: #2196f3; box-shadow: 0 0 8px #2196f3; }
.grade-badge.SSR { background: linear-gradient(135deg, #f44336, #e91e63); box-shadow: 0 0 12px #e91e63; }
.grade-badge.UR {
  background: linear-gradient(45deg, #ff0080, #8000ff);
  color: white;
  text-shadow: 0 0 5px rgba(255,255,255,0.5);
  box-shadow: 0 0 15px #ff0080;
}

/* 3. UR 등급 전용 애니메이션 */
@keyframes gold-glow {
  from { box-shadow: 0 0 10px #ffd700; border-color: #ffd700; }
  to { box-shadow: 0 0 25px #ffd700; border-color: #fff; }
}

/* 체력바 */
.hpbar {
  position: absolute;
  top: -115px; 
  left: 0;
  width: 100%;
  height: 6px;
  background: #e2e8f0;
  border-radius: 3px;
  overflow: hidden;
  border: 1px solid #cbd5e1;
}

.hpfill {
  height: 100%;
  background-color: #10b981;
  transition: width 0.3s ease;
}

.side-panels { 
display: flex;
  flex-direction: column; /* 로그와 선택창을 위아래로 배치 */
  gap: 20px;
  height: 520px;          /* 배틀 그리드와 동일한 높이로 고정 */
}

/* 하단 패널: 배경이 하얗기 때문에 내부에 아주 연한 블루그레이(#f8fafc)를 살짝 깔아 경계를 줬습니다 */
.log-panel, .select-panel {
 flex: 0 0 auto;
  min-width: 600px;
  height: 269px;
  background: #f8fafc; 
  border: 2px dashed #3b66f5; 
  border-radius: 12px;
  padding: 14px;
  overflow-y: auto;
  box-sizing: border-box;
  box-shadow: 0 4px 16px rgba(59, 102, 245, 0.06);
}

.top-controls { 
display: flex;
    justify-content: center;
    align-items: center;
    gap: 15px;
    width: 100%;             /* 화면 전체 너비 */
    position: fixed;         /* 상단 고정 */
    top: 0;
    left: 0;
    z-index: 1000;           /* 다른 요소들보다 위로 배치 */
    background: white;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    white-space: nowrap;
}

/* 제목: 왼쪽 끝 배치 */
.game-title {
    margin: 0;
    font-size: 24px;
    color: #1e293b;
    flex: 1; /* 왼쪽 공간을 확보하여 컨트롤러를 중앙으로 밀어냅니다 */
    text-align: left;
}
/* 컨트롤러: 중앙 배치 */
.controls-right {
    display: flex;
    align-items: center;
    gap: 12px;
    flex: 1; /* 제목과 동일한 비율을 가져서 중앙 정렬을 도움 */
    justify-content: center; /* 중앙 정렬 핵심 */
}
/* 오른쪽 끝에 뭔가를 더 두고 싶다면 아래 스타일 추가 */
.spacer {
    flex: 1; /* 마지막에 빈 div를 하나 넣으면 제목은 왼쪽, 컨트롤러는 완벽 중앙이 됨 */
}

.projectile {
  position: absolute;
  /* 이동은 transition이 담당 */
  transition: all 1s linear; 

/* 부모(.cell)를 꽉 채우게 설정 */
 width: var(--size);
  height: var(--size);
  background-image: var(--url);
  background-repeat: no-repeat;

  background-size: var(--total-size);



  animation: play-any-sprite 1s steps(var(--frames), jump-none) infinite;
  
  pointer-events: none;
  z-index: 999;
}

@keyframes play-any-sprite {
  from { background-position: 0px 0px; }
  to { 
    /* 핵심: cols와 rows 만큼 전체를 다 지나가야 딱 맞습니다 */
  background-position: calc(-1 * var(--size) * (var(--cols) - 1)) 
                         calc(-1 * var(--size) * (var(--rows) - 1));
  }
}


   /* 선택창을 가로 정렬 */
#playerChars, #enemyChars {
  display: flex;
  flex-direction: row;   /* 가로축 정렬 */
  gap: 10px;             /* 캐릭터 사이 간격 */
  overflow-x: auto;      /* 넘치면 가로 스크롤 */
  white-space: nowrap;   /* 줄바꿈 방지 */
  /* 핵심: 부모 컨테이너 내부에서 영역을 넘지 않도록 제한 */
  width: 100%;            /* 부모가 허용하는 만큼만 씀 */
  max-width: 500px; 
  padding-bottom: 10px; /* 스크롤바 공간 확보 */

  /* 3. 공간 확보 */
  padding: 10px;        /* 안쪽 여백 추가 */

  
  /* 4. [중요] 카드가 너무 작아지는 것 방지 */
  flex-shrink: 0;       /* 부모가 작아져도 내 크기는 유지해라 */
}

/* ⭐ 내부 캐릭터 카드가 쪼그라드는 현상 방지 */
#playerChars .char-card, 
#enemyChars .char-card {
  flex-shrink: 0;        /* 부모 크기가 줄어들어도 내 크기(160px) 유지 */
}
/* 배틀 로그 */
#battleLog {
  width: 100%;
  height: 100%;
  box-sizing: border-box;
  background: #ffffff; /* 로그 내부도 깔끔하게 화이트 처리 */
  color: #334155;
  padding: 12px;
  border-radius: 8px;
  font-family: 'Pretendard', monospace;
  font-size: 13px;
  line-height: 1.5;
  border: 1px solid #cbd5e1;
}

#battleLog br {
  margin-bottom: 4px;
}

/* 스크롤바 디자인 */
::-webkit-scrollbar {
  width: 6px;
  height: 6px;
}
::-webkit-scrollbar-track {
  background: transparent;
}
::-webkit-scrollbar-thumb {
  background: #cbd5e1;
  border-radius: 4px;
}
::-webkit-scrollbar-thumb:hover {
  background: #3b66f5;
}


/* 상단 컨트롤러 레이아웃 */
.top-controls {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 12px;
  padding: 15px;
  background: #ffffff;
  border-bottom: 2px solid #e2e8f0;
}

/* 세련된 버튼 스타일 */
button {
  background-color: #ffffff;
  color: #1e293b;            /* 아주 진한 회색 (검정색보다 고급스러움) */
  border: 1.5px solid #3b82f6; /* 약간 얇고 선명한 테두리 */
  padding: 5px 15px;         /* 좌우를 조금 더 길게 하여 균형 맞춤 */
  border-radius: 4px;        /* 둥근 정도를 낮춰서 각진 느낌으로(모던함) */
  font-weight: 500;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.2s ease;
}

/* 마우스 올렸을 때 */
button:hover {
  background-color: #eff6ff;
  border-color: #2563eb;
}

/* 입력창 스타일 (버튼과 높이 맞추기) */
input {
  padding: 5px 10px;
  border: 1px solid #cbd5e1;
  border-radius: 4px;
  font-size: 14px;
  color: #475563;
}

    /* 음악 토글 버튼 전용 스타일 */
#toggleMusic {
    padding: 8px 16px;
    border-radius: 20px;
    border: 2px solid #3b66f5;
    background: #ffffff;
    color: #3b66f5;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s ease;
    margin-right: 10px;
}

#toggleMusic:hover {
    background: #3b66f5;
    color: #ffffff;
}

/* 음악이 꺼졌을 때 상태 표시를 위한 클래스 */
#toggleMusic.off {
    border-color: #cbd5e1;
    background: #f1f5f9;
    color: #94a3b8;
}


    #volumeSlider {
    vertical-align: middle;
    cursor: pointer;
    width: 100px; /* 폭 조절 */
}@media (max-width: 768px) {

    /* 1. 상단 바 높이 및 요소 조절 (유지) */
    .top-controls {
        flex-direction: column !important; 
        align-items: center !important;
        gap: 4px !important;
        padding: 6px 4px !important;
        height: auto !important;
    }
    .game-title {
        font-size: 1rem !important;
        text-align: center !important;
        margin: 0 0 2px 0 !important;
        flex: none !important;
    }
    .controls-right {
        display: flex !important;
        flex-direction: row !important;
        flex-wrap: wrap !important;
        justify-content: center !important;
        align-items: center !important;
        gap: 4px !important;
        width: 100% !important;
        flex: none !important;
    }
    input {
        width: 80px !important;
        padding: 2px 4px !important;
        font-size: 0.75rem !important;
        height: 22px !important;
    }
    button {
        padding: 2px 6px !important;
        font-size: 0.75rem !important;
        height: 22px !important;
        line-height: 1 !important;
    }
    #toggleMusic {
        padding: 2px 6px !important;
        font-size: 0.75rem !important;
        height: 22px !important;
        margin: 0 !important;
        border-radius: 4px !important;
    }
    #volumeSlider {
        width: 50px !important;
        height: 12px !important;
        margin: 0 !important;
        vertical-align: middle;
    }
    .controls-right div, .controls-right span, .controls-right p {
        font-size: 0.85rem !important;
        margin: 2px 0 !important;
    }

    /* 2. 메인 컨테이너 간격 축소 */
    .container {
        display: flex !important;
        flex-direction: column !important;
        align-items: center !important; 
        justify-content: center !important;
        gap: 8px !important;          /* 💡 간격을 20px -> 8px로 대폭 줄여서 위로 밀착! */
        width: 100% !important;
        padding: 10px;
        margin-top: 75px !important;   /* 상단바 바로 밑에 붙도록 조절 */
        box-sizing: border-box !important;
    }

    /* 3. 🚨 [핵심] 오른쪽 쏠림 방지: 배틀필드 감싸는 부모 박스 초기화 */
    .left-panel, .field-panel {
        width: 100% !important;
        max-width: 100% !important;
        min-width: 0 !important;       /* PC의 600px 족쇄를 완전히 파괴 */
        margin: 0 auto !important;
        box-sizing: border-box !important;
        display: flex !important;
        flex-direction: column !important;
        align-items: center !important; /* 내부에 있는 배틀 그리드를 화면 정중앙으로! */
        justify-content: center !important;
    }

    /* 4. 배틀 그리드 중앙 정렬 및 크기 고정 */
    .battleGrid {
        grid-template-columns: repeat(6, minmax(40px, 1fr)) !important;
        grid-template-rows: repeat(6, minmax(40px, 1fr)) !important; 
        height: auto !important;
        max-hight: 340!importamt;
        display: grid;
        margin: 0 auto !important; 
        justify-content: center; 
        width: 90% !important;
        min-width: 340!important;      
       max-width: 340!important;   
    }

    /* 5. 사이드 패널(로그 + 선택창) 간격 밀착 */
    .side-panels {
        display: flex !important;
        flex-direction: column !important;
        align-items: center !important; 
        width: 100% !important;
        margin: 0 auto !important;
        gap: 4px !important;          /* 💡 로그창과 선택창 사이의 틈새도 8px로 좁힘 */
    }

    /* 6. 로그창/선택창 박스 마진 제거 */
    .log-panel, .select-panel {
        min-width: 0 !important;      
        width: 92% !important;        /* 좌우 여백을 살짝 더 넓혀서 이쁘게 조절 */
        margin: 0 auto !important;    /* 💡 위아래 쓸데없는 마진을 0으로 지워서 갭 밀착 */
        display: block !important;    
        box-sizing: border-box !important;
    }

    .log-panel {
        max-height: 60px !important;
    }
    #battleLog {
        height: 40px !important;
        font-size: 0.9rem;
    }
}
  </style>
</head>
<body>
  
  <audio id="bgm" src="./assets/bgm.mp3" loop preload="auto"></audio>
<div class="top-controls">
    <h2 class="game-title">🍒⛓️애리체스⛓️</h2>
    
    <div class="controls-right">
        <label>플레이어 이름: </label>
        <input id="playerTitle" type="text">
        <button id="loadCharsBtn">캐릭터 불러오기</button>
        <button onclick="startBattle()">전투 시작!</button>
        <button id="toggleMusic">음악 ON 🎵</button>
      <label for="volumeSlider">볼륨:</label>
    <input type="range" id="volumeSlider" min="0" max="1" step="0.1" value="0.3">
        <span id="scoreDisplay" style="margin-left: 20px; font-weight: 900; color: #ff0080; font-size: 20px;">점수: 0</span>
    </div>

    <div class="spacer" style="flex: 1;"></div>
</div>
  
  


  <div class="container" style="display: flex; gap: 40px;">
    
    <div class="field-panel" style="display: flex; flex-direction: column; gap: 10px;">
      <h3>전투 필드</h3>
      <div id="battleGrid" class="battleGrid">
        </div>
    </div>

    <div class="side-panels" style="display: flex; flex-direction: column; gap: 10px;">

// 등급별 가중치 확률 추출기 (Common: 60%, Rare: 25%, Epic: 12%, Legendary: 3%)
function getRandomBadge() {
    const rand = Math.random() * 100;
    let targetGrade = rand < 60 ? "Common" : rand < 85 ? "Rare" : rand < 97 ? "Epic" : "Legendary";
    const filtered = badgePool.filter(b => b.grade === targetGrade);
    return filtered[Math.floor(Math.random() * filtered.length)];
}

function initBadgeSelection() {
    const overlay = document.getElementById("badgeInitOverlay");
    const container = document.getElementById("badgeInitContainer");
    container.innerHTML = "";
    
    // 무작위 배지 3개 추출
    const picks = [getRandomBadge(), getRandomBadge(), getRandomBadge()];
    
    picks.forEach((badge, index) => {
        const card = document.createElement("div");
        card.className = "reward-card badge-back";
        card.innerHTML = `
            <h3 class="question-mark">?</h3>
            <div class="info">
                <span style="color:${badge.color}; font-size:0.8rem; font-weight:bold;">[${badge.grade}]</span>
                <h3>${badge.name}</h3>
                <p>${badge.desc}</p>
            </div>
        `;
        
        card.onclick = () => {
            if (card.classList.contains("revealed")) return;
            
            // 1. 클릭한 카드 뒤집기 연출
            revealCard(card, badge);
            
            // 2. 1초 뒤 나머지 카드 전체 공개 및 3개 모두 일괄 획득 처리
            setTimeout(() => {
                const allCards = container.querySelectorAll(".reward-card");
                allCards.forEach((c, i) => revealCard(c, picks[i]));
                
                // 3개 강제 인벤토리 세팅 및 데이터 가동
                picks.forEach(p => {
                    if (p.isPassive) {
                        playerBadges.push(p); // 패시브만 가방에 추가
                        applyInstantBadgeEffect(p);
                    } else {
                        applyInstantBadgeEffect(p); // 액티브는 효과만 즉시 발동
                       
                    }
                });


                updateBadgeUI();
                
                log("🎁 스타팅 배지 3개가 등록되었습니다!");
                
                // 2초 후 오버레이 페이드 아웃
                setTimeout(() => { overlay.style.display = "none"; }, 2000);
            }, 1000);
        };
        container.appendChild(card);
    });
    overlay.style.display = "flex";
}

function revealCard(card, badge) {

    card.classList.add("revealed");

function initGrid() {
  const grid = document.getElementById("battleGrid");
  grid.innerHTML = ""; // 초기화

  for (let i = 0; i < 36; i++) { // 36칸으로 변경
    const cell = document.createElement("div");
    cell.className = "cell";
    
    // 좌표 계산 (6x6)
    const x = i % 6;
    const y = Math.floor(i / 6);
    
    cell.addEventListener("dragover", e => { e.preventDefault(); cell.classList.add("dragover"); });
    cell.addEventListener("dragleave", () => cell.classList.remove("dragover"));

    
    
    cell.addEventListener("drop", e => {
      e.preventDefault();
      cell.classList.remove("dragover");

        // 1. [핵심] 이미 유닛이 들어있는 셀인지 확인!
      if (cell.dataset.char) {
          log("⚠️ 이미 유닛이 배치된 곳입니다!");
          // 여기서 dragging 클래스만 제거해서 카드가 다시 돌아오게 할 수 있습니다.
        document.querySelector(".dragging")?.classList.remove("dragging");
          return; // 여기서 함수를 멈춰서 배치를 막음
      }
      
      const rawData = JSON.parse(e.dataTransfer.getData("text"));
      const data = { ...rawData };
      data.uniqueId = 'char_' + Date.now() + '_' + Math.floor(Math.random() * 1000);
      
      // [중요] y좌표를 보고 진영 판별 (0,1,2행=플레이어 / 3,4,5행=적)
      // 드롭 시점 (initGrid 내부)
      data.x = x; 
      data.y = y;
      data.side = 'player'; 
      data.maxHp = data.hp;
      data.range = data.range ;

      // 코스트 제한 체크
      const grade = data.grade || "N";
      const cost = COST_TABLE[grade] || 0;
      
      // 현재 배치된 유닛들 중 같은 진영의 코스트 합계 계산
      let currentCost = 0;
      document.querySelectorAll("#battleGrid .cell").forEach(c => {
        if (c.dataset.char) {
          let d = JSON.parse(c.dataset.char);
          if (d.side === data.side) currentCost += COST_TABLE[d.grade] || 0;
        }
      });

      if (currentCost + cost > (data.side === 'player' ? PLAYER_COST_LIMIT : ENEMY_COST_LIMIT)) {
        alert(`${data.side === 'player' ? '플레이어' : '적군'} 코스트 초과!`);
        return;
      }

      // 데이터 및 화면 적용
      cell.dataset.char = JSON.stringify(data);
      cell.innerHTML = `
        <div class="char-grid placed">
          <div class="hpbar"><div class="hpfill" style="width:100%"></div></div>
          <img src="${data.img}" alt="${data.name}">
          <div class="grade-badge ${grade}">${data.grade}</div>
        </div>`;

      if (grade === "UR") cell.classList.add("UR-active");
      
      const draggedEl = document.querySelector(".dragging");
      if (draggedEl) draggedEl.remove();
      updateCostDisplay();

      

      // [추가] 배치 완료 후, 선택창(`playerChars`)이 비었는지 확인
    const playerCharsContainer = document.getElementById("playerChars");
    
    // 선택창에 남아있는 .char-card 개수를 셉니다.
    const remainingCards = playerCharsContainer.querySelectorAll(".char-card").length;
   
      });

        
        grid.appendChild(cell);
      }
    }

function updateTitle(type){

function updateCostDisplay(){
  let playerCost = 0;
  document.querySelectorAll("#battleGrid .cell").forEach(c=>{
    // ⭐ [수정] 데이터가 있고, '동시에 화면에 캐릭터(.char-grid)가 존재할 때만' 코스트 계산!
    if(c.dataset.char && c.querySelector(".char-grid")){
      let d = JSON.parse(c.dataset.char);
      playerCost += COST_TABLE[d.grade] || 0;

}

// [함수 2] 승리 조건 체크
function isRoundCleared() {
    const enemies = Array.from(document.querySelectorAll("#battleGrid .cell"))
        .filter(c => c.dataset.char)
        .map(c => JSON.parse(c.dataset.char))
        .filter(u => u.side === 'enemy' && u.hp > 0);
    
    return enemies.length === 0;
}


function isRounddefeat() {
    const players = Array.from(document.querySelectorAll("#battleGrid .cell"))
        .filter(c => c.dataset.char)
        .map(c => JSON.parse(c.dataset.char))
        .filter(u => u.side === 'player' && u.hp > 0);
    
    return players.length === 0;
}

window.isBossRound = false;

// =========================================================================
// 2. 적 스폰 함수 (10라운드 단위 보스 스폰 및 스케일링 완전 자동화)
// =========================================================================
async function prepareRound(round) {
    // 1️⃣ 보스 라운드 판별 (10, 20, 30... 라운드 인지 체크)
    window.isBossRound = (round % 10 === 0);

    if ( window.isBossRound) {
        log(`📢 [ALERT] 라운드 ${round}: 강력한 월드 보스가 출현합니다!! 🚨`);
    } else {
        log(`라운드 ${round} 준비: 적 스폰 중...`);
    }

    let users = await fetchSheetData(); 
    if (!users) return;

    const enemyMaster = users.find(u => u.nickname === "스으리슬쩍");
    if (!enemyMaster) {
        console.error("적군 데이터를 가진 유저를 찾을 수 없습니다.");
        return;
    }
    
    // 기본 N등급 카드 백업
    const nGradeCard = enemyMaster.cards.find(c => c.grade === "N");
    const nGradeImg = nGradeCard ? nGradeCard.img : CONFIG.FALLBACK_IMAGE;

    const cells = Array.from(document.querySelectorAll("#battleGrid .cell"));
    const emptyEnemyCells = cells.filter((c, index) => {
        const y = Math.floor(index / 6); 
        return y <= 4 && !c.dataset.char;
    });

    // 2️⃣ 변수 선언 (보스 vs 일반 격차 부여)
    let spawnCount, enemyName, hp, atk, range, enemyImg, borderStyle, glowStyle;

    if ( window.isBossRound) {
        // 🔥 [보스 전용 세팅]
        spawnCount = 1; // 보스는 무조건 한 마리만 위엄있게 등장!
        enemyName = `👑👑 [WORLD BOSS] 초 미소녀 멘헤라 애리 Lv.${round}`;
        
        // 스탯 대폭 상향 (일반 몹 체력의 4배, 공격력 2배, 광역 사거리 4칸)
        hp = (4000 + (round * 2000)) * 4; 
        atk = (100 + (round * 150)) * 2;  
        range = 4; 

        // 적 마스터의 카드 중 UR -> SSR -> SR 순서로 고화질 일러스트가 있다면 보스 이미지로 강탈!
        const bossCard = enemyMaster.cards.find(c => c.grade.toUpperCase() === "UR") || 
                         enemyMaster.cards.find(c => c.grade.toUpperCase() === "SSR") || 
                         enemyMaster.cards.find(c => c.grade.toUpperCase() === "SR") || 
                         nGradeCard;
        enemyImg = bossCard ? bossCard.img : CONFIG.FALLBACK_IMAGE;

        // 보스 전용 붉은 해골 아우라 이펙트
        borderStyle = "5px ridge #ef4444"; 
        glowStyle = "0 0 25px #ef4444, inset 0 0 15px #ef4444"; 

    } else {
        const rawCount = 2 + Math.floor(round / 2);
        // 🍃 [일반 라운드 세팅 - 기존 로직 유지]
        spawnCount = Math.min(emptyEnemyCells.length, (rawCount - 1) % 10 + 1); // 1~10 사이에서 라운드에 따라 증가 후 초기화 반복
        enemyName = `오염된 밤티 애리 Lv.${round}`;
        hp = 500 + (round * 500);
        atk = 50 + (round * 100);
        range = 2;
        enemyImg = nGradeImg;

        // 라운드 일의 자리 숫자에 따라 촘촘하게 테두리 진화 (예: 14라운드는 파란색, 18라운드는 보라색)
        const roundStep = round % 10;
        if (roundStep >= 7) {
            borderStyle = "3px dashed #a855f7"; // 보라색 점선
            glowStyle = "0 0 10px #a855f7";
        } else if (roundStep >= 4) {
            borderStyle = "3px solid #3b82f6";  // 파란색 실선
            glowStyle = "0 0 6px #3b82f6";
        } else {
            borderStyle = "2px solid #ff5555";  // 기본 빨간색
            glowStyle = "none";
        }
    }

    // 빈 칸 무작위 배치
    emptyEnemyCells.sort(() => Math.random() - 0.5);

    for (let i = 0; i < spawnCount; i++) {
        const targetCell = emptyEnemyCells[i];
        const cellIndex = cells.indexOf(targetCell);
        
        // 공통 데이터 주입 루프
        const enemyData = {
            uniqueId: `enemy_${round}_${i}_${Date.now()}`,
            name: enemyName,
            side: "enemy",
            grade: window.isBossRound ? "UR" : "N", // 보스는 UR등급 이펙트 연동
            hp: hp,     
            maxHp: hp,
            atk: atk,      
            range: range,
            x: cellIndex % 6,
            y: Math.floor(cellIndex / 6),
            img: enemyImg 
        };

        targetCell.dataset.char = JSON.stringify(enemyData);
        
        // 동적 스타일 시각화 주입
        targetCell.innerHTML = `
            <div style="position: relative; width: 100%; height: 100%;">
                <img src="${enemyData.img}" style="width:100%; height:100%; object-fit:cover; border-radius:8px; border: ${borderStyle}; box-shadow: ${glowStyle};">
                <div class="hpbar" style="position:absolute; bottom:-10px; left:0; width:100%; height:8px; background:#333; border-radius:4px; overflow:hidden;">
                    <div class="hpfill" style="width:100%; height:100%; background:red; transition: width 0.2s;"></div>
                </div>

   // 등급별 체력 설정
  let hp = 0;
  let range = 0; // 기본 사거리
  let atkmult = 0; // 공격력 배율
  switch(card.grade.toUpperCase()){
    case "N":
      hp = 5000;
      range = 2;
      atkmult =0.5;
      break;
    case "R":
      hp = 7000;
      range = 2; 
      atkmult =0.5; 
      break;
    case "S":
      hp = 10000;
      range = 3;
      atkmult =0.5;
      break;
    case "SR":
      hp = 20000;
      range = 5;
      atkmult =0.65;
      break;
    case "SSR":
      hp = 30000;
      range = 10;
      atkmult =0.5;
      break;
    case "UR":
      hp = 50000;
      range = 2;
      atkmult =1.2;
      break;
    default:
      hp = 80; // 알 수 없는 등급일 때 기본값
  }
  // 코스트 계산
  const cost = COST_TABLE[card.grade.toUpperCase()] || 0;
  // 데이터 세팅
  charDiv.dataset.name  = card.name;
  charDiv.dataset.grade = card.grade;
  charDiv.dataset.hp    = hp;
  charDiv.dataset.atk   = card.power*atkmult;
  charDiv.dataset.img   = card.img;
  charDiv.dataset.range = range;   // 기본 사거리 1로 설정 (필요에 따라 조정 가능)

// 카드 HTML 구조
  charDiv.innerHTML = `
    <div class="char-header">
      <span class="grade-badge">${card.grade}</span>
      <span class="cost-display">★:${cost}</span>

// 구글 시트 데이터 Fetch 및 파싱 로직
async function fetchSheetData() {
    const url = `https://docs.google.com/spreadsheets/d/${CONFIG.SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(CONFIG.SHEET_NAME)}`;

    try {
          const response = await fetch(url);
        if (!response.ok) {
            throw new Error(`HTTP 오류: ${response.status}`);
        }
        const text = await response.text();
        const match = text.match(/google\.visualization\.Query\.setResponse\(([\s\S\w]+)\);/)[1];
        if (!match) {
            throw new Error("구글 시트 응답 형식이 올바르지 않습니다.");
        }
        const data = JSON.parse(match);

        // Optional Chaining (?.)과 Reduce를 활용해 데이터를 안전하고 빠르게 그룹화
        const userMap = data.table.rows.reduce((acc, row) => {
            const nickname = row?.c?.[0]?.v;
            
            // 유효하지 않은 행이거나 헤더인 경우 스킵
            if (!nickname || nickname === '닉네임') return acc;

            const grade = row?.c?.[2]?.v || 'N';
            const cardName = row?.c?.[3]?.v || '알수없음';
            const power = parseInt(row?.c?.[4]?.v) || 0;
            // 구글 시트 6번째 열(F열, 인덱스 5)에서 실제 이미지 링크 가져오기
            const imgUrl = row?.c?.[5]?.v || CONFIG.FALLBACK_IMAGE;

            if (["A","B","C"].includes(grade.toUpperCase())) return acc;

            if (!acc[nickname]) {
                acc[nickname] = { nickname, totalPower: 0, cards: [] };
            }

            acc[nickname].cards.push({
                name: cardName,
                grade: grade,
                power: power,
                img: imgUrl // 실제 구글 시트의 이미지 링크 사용
            });
            acc[nickname].totalPower += power;

            return acc;
        }, {});

        return Object.values(userMap);
    } catch (error) {
        console.error("구글 시트 연동 오류:", error);
        return null; // 에러 발생 시 null 반환
    }
}

function getGridPos(cell) {

// 🔥 [백엔드 주입 5] 신속 이동 효과 연동형 이동 엔진
function moveUnit(unit, fromCell, allUnitsOnBoard) {
    const hasSpeedBadge = playerBadges.some(b => b.type === "speed");
    // 신속 이동 배지 소지 시 아군은 루프가 2번 돌아 한 턴에 총 2칸 고속 전진함
    const moveCount = (unit.side === 'player' && hasSpeedBadge) ? 2 : 1;
    let currentFromCell = fromCell;

    for (let i = 0; i < moveCount; i++) {
        const posA = getGridPos(currentFromCell);
        let nearestTarget = null;
        let minD = Infinity;

        allUnitsOnBoard.filter(t => t.hp > 0 && t.side !== unit.side).forEach(t => {
            const toCell = [...document.querySelectorAll("#battleGrid .cell")]
                .find(c => c.dataset.char && JSON.parse(c.dataset.char).uniqueId === t.uniqueId);
            if (!toCell) return;
            const posB = getGridPos(toCell);
            const dist = Math.abs(posA.x - posB.x) + Math.abs(posA.y - posB.y);
            if (dist < minD) { minD = dist; nearestTarget = toCell; }
        });

        if (nearestTarget) {
            const posB = getGridPos(nearestTarget);
            const nextPos = {
                x: posA.x + Math.sign(posB.x - posA.x),
                y: posA.y + Math.sign(posB.y - posA.y)
            };
            
            const nextCell = [...document.querySelectorAll("#battleGrid .cell")]
                .find(c => getGridPos(c).x === nextPos.x && getGridPos(c).y === nextPos.y);
                
            if (nextCell && !nextCell.dataset.char) {
                const isUR = currentFromCell.classList.contains("UR-active");
                let unitData = JSON.parse(currentFromCell.dataset.char);
                
                const newPos = getGridPos(nextCell);
                unitData.x = newPos.x; unitData.y = newPos.y;
                
                nextCell.dataset.char = JSON.stringify(unitData);
                nextCell.innerHTML = currentFromCell.innerHTML;
                
                if (isUR) {
                    currentFromCell.classList.remove("UR-active");
                    nextCell.classList.add("UR-active");
                }
                currentFromCell.innerHTML = "";
                delete currentFromCell.dataset.char;
                currentFromCell = nextCell; // 연속 이동 포지션 갱신
            } else {
                break; 
            }
        }
    }
}

                    console.error("UR 이미지 스킨을 가져오는 중 오류 발생:", err);
                }

                log(`✨ [UR의 축복] 보유 중인 카드 [${targetCard.name}] (${oldGrade}) 카드가 최고 등급 [UR]로 각성했습니다!`);
                
                // 5. 손패 UI 새로고침
                if (typeof updateHandUI === "function") updateHandUI();
                else if (typeof renderHand === "function") renderHand();

            } else {
                log(`⚠️ [UR의 축복] 현재 손에 쥔 카드가 없어 축복이 허공으로 날아갔습니다!`);
            }
            break;

            case "bullet":
            GLOBAL_ATK_MULT *= badge.value; // 기존 배율에 새 배지 배수를 곱함 (예: 1.0 * 1.5 = 1.5)
        
          log(`⚔️ [배지 즉시발동] '${badge.name}'(${badge.grade}) 효과로 총 공격력 배율이 [${GLOBAL_ATK_MULT.toFixed(2)}배]가 되었습니다.`);
            break;  


    }
}

var GLOBAL_ATK_MULT = 1.0; // 전역 공격력 배율 변수 (초기값 1.0)



function findTargetsInRange(unit, allUnits) {
    // 1. 공격자의 현재 좌표는 매개변수로 넘어온 unit 객체에서 바로 가져옵니다.
    // allUnits에서 다시 find할 필요가 없습니다. (이미 데이터가 갱신되어 들어오기 때문)
    const posA = { x: unit.x, y: unit.y };

    // 2. 사거리 내 타겟 필터링
    return allUnits.filter(target => {
        // 본인과 같은 진영이거나, 이미 죽은(hp <= 0) 적은 제외
        if (target.side === unit.side || target.hp <= 0) return false;
        
        // 맨해튼 거리 계산 (가로 차이 + 세로 차이)
        const dist = Math.abs(posA.x - target.x) + Math.abs(posA.y - target.y);
        
        // 디버깅용 로그 (이름 확인 없이 모든 유닛에 대해 로그 출력 가능)
        // console.log(`${unit.name}이 바라보는 ${target.name}과의 거리: ${dist} (사거리:${unit.range})`);
        
        return dist <= unit.range;
    });
}



// =========================================================================
// [3단계 & 백엔드] 인게임 전투 루프 내 실시간 배지 판정 주입
// =========================================================================
function startBattle() {
    if (isBattleRunning) return;
    isBattleRunning = true;
    log("=== 전투 시작 ===");
    if (isRoundCleared()) {
        log(`스테이지 ${currentRound}  적이 몰려옵니다...`);
        prepareRound(currentRound);
    }

    let round = 1;
    const interval = setInterval(() => {
        let moveQueue = [];
        
        // 현재 필드 위 유닛 데이터 수집 파트
        const allUnits = Array.from(document.querySelectorAll("#battleGrid .cell"))
            .filter(c => c.dataset.char)
            .map(c => JSON.parse(c.dataset.char));

        let players = allUnits.filter(u => u.side === 'player');
        let enemies = allUnits.filter(u => u.side === 'enemy');

        // ------------------------------------------------
        // [아군(Player) 행동 턴]
        // ------------------------------------------------
        players.filter(p => p.hp > 0).forEach(p => {
            const currentCell = document.querySelector(`[data-char*='"uniqueId":"${p.uniqueId}"']`);
            if (!currentCell) return;
            let pCurrent = JSON.parse(currentCell.dataset.char);
            
            // 🔥 [백엔드 주입 1] 탄막 강화 & 사거리 증폭 실시간 수식 변조
            playerBadges.forEach(badge => {
                 pCurrent.atk = Math.floor(pCurrent.atk * GLOBAL_ATK_MULT);
                if (badge.type === "range") pCurrent.range += badge.value;
            });

            const targets = findTargetsInRange(pCurrent, allUnits);
            if (targets.length > 0) {
                const target = targets[0];
                
                // 🔥 [백엔드 주입 2] 치명적 탄막 (확률형 크리티컬 데미지 배율 연산)
                let finalDamage = pCurrent.atk;
                let isCrit = false;
                const critBadge = playerBadges.find(b => b.type === "crit");
                if (critBadge && Math.random() < critBadge.value) {
                    finalDamage *= 2;
                    isCrit = true;
                }

                target.hp = Math.max(0, target.hp - finalDamage);
                
                // UI 갱신 유도용 백엔드 동기화 처리
                const targetCell = document.querySelector(`[data-char*='"uniqueId":"${target.uniqueId}"']`);
                if (targetCell) {
                    targetCell.dataset.char = JSON.stringify(target);
                    const hpbar = targetCell.querySelector(".hpfill");
                    if (hpbar) hpbar.style.width = ((target.hp / target.maxHp) * 100) + "%";

                    if (target.hp <= 0) {
                        targetCell.innerHTML = "";
                        targetCell.classList.remove("UR-active");
                        delete targetCell.dataset.char;
                        addScore(currentRound * 100);
                        updateCostDisplay();
                    }
                }
                    // =========================================================================
                    // 🔥 [백엔드 주입 - 흡혈 로직] 가한 피해량의 일부를 내 HP로 전환!
                    // =========================================================================
                    const vampireBadge = playerBadges.find(b => b.type === "vampire");
                    if (vampireBadge && pCurrent.hp > 0) {
                        // 최대 체력(maxHp)을 넘지 않는 선에서 회복량 계산
                        const healAmount = Math.floor(finalDamage * vampireBadge.value);
                        
                        if (healAmount > 0) {
                            const oldHp = pCurrent.hp;
                            pCurrent.hp = Math.min(pCurrent.maxHp, pCurrent.hp + healAmount);
                            const actualHeal = pCurrent.hp - oldHp; // 실제 회복된 양

                            // 갱신된 아군의 체력 데이터를 DOM(셀)에 다시 저장!! (이걸 안 하면 체력이 안 변함)
                            currentCell.dataset.char = JSON.stringify(pCurrent);

                            // 아군 체력바 UI 실시간 새로고침
                            const pCurrentHpbar = currentCell.querySelector(".hpfill");
                            if (pCurrentHpbar) {
                                pCurrentHpbar.style.width = ((pCurrent.hp / pCurrent.maxHp) * 100) + "%";
                            }

                            // 흡혈 성공 로그 추가 출력 (원한다면 위트 있는 드립으로 커스텀 가능)
                            if (actualHeal > 0) {
                                log(`🩸 [정기 흡수] ${pCurrent.name}이(가) 권능을 통해 정기로 ${actualHeal} 만큼 체력을 회복했습니다! (${pCurrent.hp}/${pCurrent.maxHp})`);
                            }
                        }
                    }


                
                // 🔥 [교체 적용 1] 아군 공격 로그를 유머 생성기로 대체!
                const combatLog = getRandomAttackLog(pCurrent, target, finalDamage, isCrit);
                log(combatLog);

                if (currentCell && targetCell) shootProjectile(currentCell, targetCell, pCurrent.grade);
            } else {
                moveQueue.push({ unit: pCurrent, cell: currentCell });
            }
        });

        // ------------------------------------------------
        // [적군(Enemy) 행동 턴]
        // ------------------------------------------------
        enemies.filter(e => e.hp > 0).forEach(e => {
            const fromCell = document.querySelector(`[data-char*='"uniqueId":"${e.uniqueId}"']`);
            if (!fromCell) return;
            const eCurrent = JSON.parse(fromCell.dataset.char);
            
            const targets = findTargetsInRange(eCurrent, allUnits);
            if (targets.length > 0) {
                const target = targets[0];

                // 🔥 [교체 및 위치 조정 2] 시간 정지 배지 체크를 타겟 확보 직후로 이동!
                const slowBadge = playerBadges.find(b => b.type === "slow");
                if (slowBadge && Math.random() < slowBadge.value) {
                    // 데미지를 0으로 넘겨 행동 불발/시간 정지 전용 드립을 출력합니다.
                    const missLog = getRandomAttackLog(eCurrent, target, 0);
                    log(missLog);
                    return; 
                }
                
                // 🔥 [백엔드 주입 4] 방어막 전개 (아군이 최종 피격 시 데미지 30% 감쇄 연산)
                let enemyDamage = eCurrent.atk;
                const shieldBadge = playerBadges.find(b => b.type === "shield");
                if (shieldBadge) {
                    enemyDamage = Math.max(1, Math.floor(enemyDamage * shieldBadge.value));
                }

                target.hp = Math.max(0, target.hp - enemyDamage);
                
                const targetCell = document.querySelector(`[data-char*='"uniqueId":"${target.uniqueId}"']`);
                if (targetCell) {
                    targetCell.dataset.char = JSON.stringify(target);
                    const hpbar = targetCell.querySelector(".hpfill");
                    if (hpbar) hpbar.style.width = ((target.hp / target.maxHp) * 100) + "%";

                    if (target.hp <= 0) {
                        targetCell.innerHTML = "";
                        targetCell.classList.remove("UR-active");
                        delete targetCell.dataset.char;
                        updateCostDisplay();
                    }
                }

                // 🔥 [교체 적용 3] 적군 공격 로그를 유머 생성기로 대체!
                const combatLog = getRandomAttackLog(eCurrent, target, enemyDamage);
                log(combatLog);

                if (fromCell && targetCell) shootProjectile(fromCell, targetCell, eCurrent.grade);
            } else {
                moveQueue.push({ unit: eCurrent, cell: fromCell });
            }
        });

        // 이동 큐 처리 실행
        moveQueue.forEach(item => moveUnit(item.unit, item.cell, allUnits));

        // ------------------------------------------------
        // [라운드 클리어 및 루프 종료 판정]
        // ------------------------------------------------
        if (isRoundCleared()) {
            clearInterval(interval); 
            isBattleRunning = false;
            log(`🎉 스테이지 ${currentRound} 클리어 성공!`);
            if (isRounddefeat()) {
                const remainingCards = document.querySelectorAll("#playerChars .char-card").length;
                if (remainingCards === 0) {
                    log("❌ 카드가 없고 아군이 전멸했습니다. 게임 오버!");
                    clearInterval(interval);
                    isBattleRunning = false;
                    gameOver(); 
                    return;
                }
            }
    
            setTimeout(() => { showRoundRewards(); }, 1000); 
            return;
        } else if (isRounddefeat()) {
            const remainingCards = document.querySelectorAll("#playerChars .char-card").length;

            if (remainingCards === 0) {
                log("❌ 카드가 없고 아군이 전멸했습니다. 게임 오버!");
                clearInterval(interval);
                isBattleRunning = false;
                gameOver(); 
                return;
            } else {
                log(`스테이지 ${currentRound} 패배! 남은 카드로 재정비하세요.`);
                clearInterval(interval);
                isBattleRunning = false;
                currentRound++; 
                log(`전투가 멈췄습니다. 카드를 배치하고 다시 '전투 시작'을 누르세요.`);
                return;
            }
        }

        round++;
    }, 1000);
}
function getRandomAttackLog(attacker, target, damage, isCrit = false) {
    const isBoss = attacker.name.includes("BOSS");
    const isUR = attacker.grade === "UR";

    if (damage <= 0) {
        const missLogs = [
            `💨 ${target.name}이(가) 회피! "어라? 춤추는 줄?"`,
            `💤 ${attacker.name}의 헛손질! "방금 뭐 함?"`,
            `🛡️ ${target.name}이 가볍게 댄스로 회피!`,
            `🤫 공격 증발! ${attacker.name}의 뇌정지 발동.`
        ];
        return missLogs[Math.floor(Math.random() * missLogs.length)];
    }

    if (isBoss) {
        const bossLogs = [
            `🚨 [BOSS] ${attacker.name}의 광역 폭격! (-${damage})`,
            `💀 [BOSS] ${attacker.name}이 ${target.name}을(를) 구겼습니다! (-${damage})`,
            `🔥 [BOSS] ${attacker.name}의 압도적 멘탈 분쇄! (-${damage})`
        ];
        return bossLogs[Math.floor(Math.random() * bossLogs.length)];
    }

    if (isCrit) {
        const critLogs = [
            `🎯 [CRIT] 명치에 죽빵! (-${damage})`,
            `🔥 [CRIT] 꿀밤 한 대가 핵폭탄급! (-${damage})`,
            `⚡ [CRIT] ${attacker.name}의 물리치료! (-${damage})`,
            `💥 [CRIT] 조상님 뵙고 왔습니다! (-${damage})`
        ];
        return critLogs[Math.floor(Math.random() * critLogs.length)];
    }

    if (isUR) {
        const urLogs = [
            `✨ [UR] 자본주의의 매운맛! (-${damage})`,
            `🌟 [UR] ${attacker.name}의 광채 쇼! (-${damage})`,
            `🔱 [UR] 신화급 참교육 시전! (-${damage})`
        ];
        return urLogs[Math.floor(Math.random() * urLogs.length)];
    }

    const normalLogs = [
        `🥊 ${attacker.name}의 등짝 스매시! (-${damage})`,
        `💥 ${attacker.name}의 뚝배기 브레이커! (-${damage})`,
        `⚔️ ${attacker.name}: "아프냐? 나도 아프다." (-${damage})`,
        `🚀 ${attacker.name}의 탄막 세례! (-${damage})`,
        `🐾 ${attacker.name}이 발가락을 밟았다! (-${damage})`
    ];
    return normalLogs[Math.floor(Math.random() * normalLogs.length)];
}




// =========================================================================
// [4단계] 라운드 승리 보상 부여 및 교체(Inventory 스왑) 처리 알고리즘
// =========================================================================
function showRoundRewards() {
    const overlay = document.getElementById("roundRewardOverlay");
    const container = document.getElementById("roundRewardContainer");
    container.innerHTML = "";
    
    // 3개의 랜덤 보상 카드 생성
    const picks = [getRandomBadge(), getRandomBadge(), getRandomBadge()];
    
    picks.forEach((badge, index) => {
        const card = document.createElement("div");
        card.className = "reward-card badge-back"; // 처음엔 물음표 뒤집힌 상태
   
        card.innerHTML = `
            <h3 class="question-mark">?</h3>
            <div class="info">
                <span style="color:${badge.color}; font-size:0.8rem; font-weight:bold;">[${badge.grade}]</span>
                
                <h3 style="margin: 5px 0;">
                    <span style="color: ${badge.isPassive ? '#60a5fa' : '#f87171'}; font-size:0.85rem;">
                        [${badge.isPassive ? '영구 패시브' : '즉시 발동'}]
                    </span> 
                    ${badge.name}
                </h3>
                
                <p>${badge.desc}</p>
            </div>
        `;
        
        card.onclick = () => {
            // 중복 클릭 및 연출 도중 다른 카드 클릭 방지 락(Lock)
            if (card.classList.contains("revealed") || container.classList.contains("selected-done")) return;
            container.classList.add("selected-done");
            
            // 1️⃣ [내가 고른 카드]를 먼저 앞면으로 싹 뒤집습니다.
            revealCard(card, badge);
            card.style.borderWidth = "3px"; // 내가 선택한 카드 두껍게 강조
            
            // 2️⃣ 0.8초 뒤, 고르지 않은 [옆 카드 2개]도 뒤집어서 보여줍니다. (구경용)
            setTimeout(() => {
                const allCards = container.querySelectorAll(".reward-card");
                allCards.forEach((c, i) => {
                    if (i !== index) {
                        revealCard(c, picks[i]);
                        c.style.opacity = "0.5"; // 안 고른 카드는 흐리게 해서 구경만 시킴
                    }
                });
                
                // 3️⃣ 구경이 끝난 1.5초 뒤, 보상 창을 닫고 인벤토리 처리로 라우팅합니다.
                setTimeout(() => {
                    overlay.style.display = "none"; // 보상 창 완전히 닫기
                    container.classList.remove("selected-done"); // 락 해제
                    
                    // 🔥 [핵심] 내가 고른 배지 데이터만 가방 검사(3칸 체크)로 넘깁니다!
                    tryAddBadge(badge, proceedToNextRound); 
                }, 1500);
                
            }, 800);
        };
        container.appendChild(card);
    });
    overlay.style.display = "flex";
}

async function tryAddBadge(newBadge, onComplete) {
    // 1️⃣ [추가] 만약 패시브가 아닌 일회성 즉시 발동 카드라면?
    if (newBadge.isPassive === false) {
        applyInstantBadgeEffect(newBadge); // 효과만 즉시 실행하고
        log(`⚡ 즉시 발동형 보상 적용 완료: ${newBadge.name}`);
        if (onComplete) onComplete();       // 가방 안 넣고 바로 다음 라운드로 진행!
        return; 
    }

    // 2️⃣ 기존의 패시브 가방 저장 로직 (3칸 체크)
    if (playerBadges.length < MAX_BADGE_SLOTS) {
        playerBadges.push(newBadge);   
        updateBadgeUI();                
        applyInstantBadgeEffect(newBadge); 
        log(`🎒 패시브 배지 장착 완료: ${newBadge.name}`);
        if (onComplete) onComplete();
    } else {
        openExchangeOverlay(newBadge, onComplete); 
    }
}

// =========================================================================
// [패시브 해제] 배지 파괴/교체 시 적용되어 있던 실시간 효과를 회수하는 함수
// =========================================================================
function removePassiveEffect(badge) {
    if (!badge || !badge.isPassive) return; // 패시브가 아니면 실행 안 함

    log(`🗑️ [패시브 파괴] '${badge.name}' 배지가 파괴되어 효과가 소멸합니다.`);

    if (badge.type === "bullet" && badge.grade === "Rare") {
        log(`✨ [영구 누적] 공포의 '${badge.name}'(레어) 아군의 공격력에 영구히 흡수되었습니다!`);
    } else {
        log(`🗑️ [패시브 파괴] '${badge.name}' 배지가 파괴되어 효과가 소멸합니다.`);
    }

    switch (badge.type) {
         case "bullet":
            // ✨ [핵심 로직] 레어 등급 불릿은 원상복구(나누기)를 건너뜁니다!
            if (badge.grade === "Rare") {
                // 아무것도 하지 않고 break -> GLOBAL_ATK_MULT 배율이 깎이지 않고 그대로 유지됨!
                break;
            }

            // 💥 일반 등급 불릿들은 기존처럼 회수 (원래대로 나누기)
            if (typeof GLOBAL_ATK_MULT !== 'undefined') {
                GLOBAL_ATK_MULT /= badge.value; 
                log(`⚔️ [버프 회수] 일반 불릿이 회수되어 총 공격력 배율이 [${GLOBAL_ATK_MULT.toFixed(2)}배]가 되었습니다.`);
            }
            break;

        case "range":
            // 💥 아군 공격 사거리 +1칸 회수
            if (typeof GLOBAL_RANGE_BONUS !== 'undefined') {
                GLOBAL_RANGE_BONUS -= badge.value;
            }
            break;

        case "shield":
            // 💥 피해량 30% 감소 효과 제거
            if (typeof GLOBAL_DAMAGE_REDUCTION !== 'undefined') {
                GLOBAL_DAMAGE_REDUCTION -= 0.3; // 0.7(30%감소) 받았던 걸 원상복구
            }
            break;

        case "crit":
            // 💥 치명타 확률 회수
            if (typeof GLOBAL_CRIT_CHANCE !== 'undefined') {
                GLOBAL_CRIT_CHANCE -= badge.value;
            }
            break;

        case "slow":
            // 💥 적 불발 확률 회수
            if (typeof ENEMY_SLOW_CHANCE !== 'undefined') {
                ENEMY_SLOW_CHANCE -= badge.value;
            }
            break;

        case "speed":
            // 💥 이동 보너스 해제
            if (typeof GLOBAL_SPEED_BONUS !== 'undefined') {
                GLOBAL_SPEED_BONUS = false;
            }
            break;

        case "vampire":
            // 🦇 실시간 체크 방식이라 배열에서 빠지면 자동으로 멈추지만, 
            // 유저에게 효과가 끝났음을 알리기 위해 로그를 남겨줍니다.
            log(`🦇 [배지 제거] '${badge.name}' 배지가 파괴되어 이제 아군들이 흡혈을 할 수 없습니다.`);
            break;
    }
    

}
function openExchangeOverlay(newBadge, onComplete) {
    const overlay = document.getElementById("badgeExchangeOverlay");
    const container = document.getElementById("badgeExchangeContainer");
    container.innerHTML = `<h3 style="width:100%; margin-bottom:15px;">새로 획득한 [${newBadge.name}] 배지를 장착하기 위해 버릴 배지를 골라주세요.</h3>`;
    
    playerBadges.forEach((oldBadge, index) => {
        const card = document.createElement("div");
        card.className = "reward-card revealed";
        card.style.borderColor = oldBadge.color;
        card.innerHTML = `
            <span style="color:#ef4444; font-weight:bold;">[교체 대상]</span>
            <h3>${oldBadge.name}</h3>
            <p>${oldBadge.desc}</p>
        `;
        
        card.onclick = async () => {
            log(`배지 스왑 완료: [${oldBadge.name}] 파괴 -> [${newBadge.name}] 장착`);
            
            // 🔥 [핵심 추가] 버려지는 기존 배지가 '영구 패시브(true)'였다면, 데이터를 바꾸기 전에 효과를 먼저 뺏어옵니다!
            if (oldBadge.isPassive) {
                removePassiveEffect(oldBadge);
            }

            playerBadges[index] = newBadge; // 데이터 스왑 (기존 자리에 새 배지 주입)
            updateBadgeUI();
            applyInstantBadgeEffect(newBadge); // 새 배지 효과 발동
            
            overlay.style.display = "none";
            if (onComplete) onComplete();
        };
        container.appendChild(card);
    });
    
    // 스킵 옵션 버튼 바인딩
    const skipBtn = document.createElement("button");
    skipBtn.innerText = "새 배지 버리고 그냥 넘어가기";
    skipBtn.style.cssText = "margin-top:20px; padding:12px; background:#64748b; color:white; border:none; border-radius:6px; cursor:pointer;";
    skipBtn.onclick = () => {
        log(`획득한 보상 [${newBadge.name}] 배지를 버렸습니다.`);
        overlay.style.display = "none";
        if (onComplete) onComplete();
    };
    container.appendChild(skipBtn);
    overlay.style.display = "flex";
}

function proceedToNextRound() {
    currentRound++;
    log(`다음 스테이지 ${currentRound} 준비 단계입니다. '전투 시작' 버튼을 누르세요.`);
}

// =======================================
// [5단계] UI 연동 실시간 시각화 처리 모듈 
// =======================================
function updateBadgeUI() {
    const ui = document.getElementById("badgeUI");
    
    // 혹시 모를 에러 방지용 안전장치
    if (!ui) {
        console.error("HTML에 id='badgeUI'를 가진 엘리먼트가 없습니다.");
        return;
    }
    
    ui.innerHTML = ""; // 기존 UI 초기화
    
    playerBadges.forEach(badge => {
        const icon = document.createElement("div");
        icon.className = "mini-badge";
        icon.style.borderColor = badge.color;
        icon.innerHTML = badge.name.substring(0, 2); // 배지 이름 앞 2글자만 노출
        icon.title = `${badge.name} [${badge.grade}]\n${badge.desc}`; // 마우스 올리면 툴팁 노출
        ui.appendChild(icon);
    });
}



</script>
